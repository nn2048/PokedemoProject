move_desc.machpunch: "The user throws a punch at blinding speed. This move always goes first."
move_desc.magicalleaf: "The user scatters curious leaves that chase the target. This attack never misses."
move_desc.magiccoat: "Moves like Leech Seed and moves that inflict status conditions are blocked by a barrier and reflected back to the user of those moves."
move_desc.magicpowder: "The user scatters a cloud of magic powder that changes the target's type to Psychic."
move_desc.magicroom: "The user creates a bizarre area in which Pokémon's held items lose their effects for five turns."
move_desc.magmastorm: "The user traps the target inside a maelstrom of fire that inflicts damage for four to five turns."
move_desc.magnetbomb: "The user launches steel bombs that stick to the target. This attack never misses."
move_desc.magneticflux: "The user manipulates magnetic fields, which boosts the Defense and Sp. Def stats of ally Pokémon with the Plus Ability or the Minus Ability."
move_desc.magnetrise: "The user levitates using electrically generated magnetism for five turns."
move_desc.magnitude: "The user attacks everything around it with a ground-shaking quake. Its power varies."
move_desc.makeitrain: "The user attacks by throwing out a mass of coins. This also lowers the user's Sp. Atk stat. Money is earned after the battle."
move_desc.maliciousmoonsault: "The user, Incineroar, strengthens its body using its Z-Power and crashes into the target with full force."
move_desc.malignantchain: "The user pours toxins into the target by wrapping them in a toxic, corrosive chain. This may also leave the target badly poisoned."
move_desc.matblock: "Using a pulled-up mat as a shield, the user protects itself and its allies from damaging moves. This does not stop status moves."
move_desc.matchagotcha: "The user fires a blast of tea that it mixed. The user's HP is restored by up to half the damage taken by the target. This may also leave the target with a burn."
move_desc.maxairstream: "This is a Flying-type attack Dynamax Pokémon use. This boosts ally Pokémon's Speed stats."
move_desc.maxdarkness: "This is a Dark-type attack Dynamax Pokémon use. This lowers the target's Sp. Def stat."
move_desc.maxflare: "This is a Fire-type attack Dynamax Pokémon use. The user intensifies the sun for five turns."
move_desc.maxflutterby: "This is a Bug-type attack Dynamax Pokémon use. This lowers the target's Sp. Atk stat."
move_desc.maxgeyser: "This is a Water-type attack Dynamax Pokémon use. The user summons a heavy rain that falls for five turns."
move_desc.maxguard: "This move enables the user to protect itself from all attacks. Its chance of failing rises if it is used in succession."
move_desc.maxhailstorm: "This is an Ice-type attack Dynamax Pokémon use. The user summons a snowstorm lasting five turns."
move_desc.maxknuckle: "This is a Fighting-type attack Dynamax Pokémon use. This boosts ally Pokémon's Attack stats."
move_desc.maxlightning: "This is an Electric-type attack Dynamax Pokémon use. The user turns the ground into Electric Terrain for five turns."
move_desc.maxmindstorm: "This is a Psychic-type attack Dynamax Pokémon use. The user turns the ground into Psychic Terrain for five turns."
move_desc.maxooze: "This is a Poison-type attack Dynamax Pokémon use. This boosts ally Pokémon's Sp. Atk stats."
move_desc.maxovergrowth: "This is a Grass-type attack Dynamax Pokémon use. The user turns the ground into Grassy Terrain for five turns."
move_desc.maxphantasm: "This is a Ghost-type attack Dynamax Pokémon use. This lowers the target's Defense stat."
move_desc.maxquake: "This is a Ground-type attack Dynamax Pokémon use. This boosts ally Pokémon's Sp. Def stats."
move_desc.maxrockfall: "This is a Rock-type attack Dynamax Pokémon use. The user summons a sandstorm lasting five turns."
move_desc.maxstarfall: "This is a Fairy-type attack Dynamax Pokémon use. The user turns the ground into Misty Terrain for five turns."
move_desc.maxsteelspike: "This is a Steel-type attack Dynamax Pokémon use. This boosts ally Pokémon's Defense stats."
move_desc.maxstrike: "This is a Normal-type attack Dynamax Pokémon use. This lowers the target's Speed stat."
move_desc.maxwyrmwind: "This is a Dragon-type attack Dynamax Pokémon use. This lowers the target's Attack stat."
move_desc.meanlook: "The user pins the target with a dark, arresting look. The target becomes unable to flee."
move_desc.meditate: "The user meditates to awaken the power deep within its body and raise its Attack stat."
move_desc.mefirst: "The user cuts ahead of the target to copy and use the target's intended move with greater power. This move fails if it isn't used first."
move_desc.megadrain: "A nutrient-draining attack. The user's HP is restored by up to half the damage taken by the target."
move_desc.megahorn: "Using its tough and impressive horn, the user rams into the target with no letup."
move_desc.megakick: "The target is attacked by a kick launched with muscle- packed power."
move_desc.megapunch: "The target is slugged by a punch thrown with muscle- packed power."
move_desc.memento: "The user faints. In return, the target's Attack and Sp. Atk stats are harshly lowered."
move_desc.menacingmoonrazemaelstrom: "After obtaining Z-Power, the user, Lunala, attacks the target with full force. This move can ignore the effect of the target's Ability."
move_desc.metalburst: "The user retaliates with much greater force against the opponent that last inflicted damage on it."
move_desc.metalclaw: "The target is raked with steel claws. This may also boost the user's Attack stat."
move_desc.metalsound: "A horrible sound like scraping metal harshly lowers the target's Sp. Def stat."
move_desc.meteorassault: "The user attacks wildly with its thick leek. The user can't move on the next turn, because the force of this move makes it stagger."
move_desc.meteorbeam: "The user gathers energy from space and boosts its Sp. Atk stat on the first turn, then attacks on the next turn."
move_desc.meteormash: "The target is hit with a hard punch fired like a meteor. This may also boost the user's Attack stat."
move_desc.metronome: "The user waggles a finger and stimulates its brain into randomly using nearly any move."
move_desc.mightycleave: "The user wields the light that has accumulated atop its head to cleave the target. This move hits even if the target protects itself."
move_desc.milkdrink: "The user restores its own HP by up to half its max HP."
move_desc.mimic: "The user copies the move last used by the target. The copied move can be used until the user of Mimic leaves the battle."
move_desc.mindblown: "The user attacks everything around it by causing its own head to explode. This also damages the user."
move_desc.mindreader: "The user senses the target's movements with its mind to ensure its next attack does not miss the target."
move_desc.minimize: "The user compresses its body to make itself look smaller, which sharply boosts its evasiveness."
move_desc.miracleeye: "Enables a Dark-type target to be hit by Psychic-type attacks. This also enables an evasive target to be hit."
move_desc.mirrorcoat: "A retaliatory attack that counters any special move, inflicting double the damage taken."
move_desc.mirrormove: "The user counters the target by mimicking the target's last move."
move_desc.mirrorshot: "The user lets loose a flash of energy at the target from its polished body. This may also lower the target's accuracy."
move_desc.mist: "The user cloaks itself and its allies in a white mist that prevents any of their stats from being lowered for five turns."
move_desc.mistball: "A mist-like flurry of down envelops and damages the target. This may also lower the target's Sp. Atk stat."
move_desc.mistyexplosion: "The user attacks everything around it and faints upon using this move. This move's power is boosted on Misty Terrain."
move_desc.mistyterrain: "This protects Pokémon on the ground from status conditions and halves damage from Dragon-type moves for five turns."
move_desc.moonblast: "Borrowing the power of the moon, the user attacks the target. This may also lower the target's Sp. Atk stat."
move_desc.moongeistbeam: "The user emits a sinister ray to attack the target. This move can be used on the target regardless of its Ability."
move_desc.moonlight: "The user restores its own HP. The amount of HP regained varies with the weather."
move_desc.morningsun: "The user restores its own HP. The amount of HP regained varies with the weather."
move_desc.mortalspin: "The user performs a spin attack that can also eliminate the effects of such moves as Bind, Wrap, and Leech Seed. This also poisons opposing Pokémon."
move_desc.mountaingale: "The user hurls giant chunks of ice at the target to inflict damage. This may also make the target flinch."
move_desc.mudbomb: "The user launches a hard-packed mud ball to attack. This may also lower the target's accuracy."
move_desc.muddywater: "The user attacks by shooting muddy water at opposing Pokémon. This may also lower their accuracy."
move_desc.mudshot: "The user attacks by hurling a blob of mud at the target. This also lowers the target's Speed stat."
move_desc.mudslap: "The user hurls mud in the target's face to inflict damage and lower its accuracy."
move_desc.mudsport: "The user kicks up mud on the battlefield. This weakens Electric-type moves for five turns."
move_desc.multiattack: "Cloaking itself in powerful energy, the user slams into the target to inflict damage. This move's type changes depending on the kind of memory disc held by the user."
move_desc.mysticalfire: "The user attacks by breathing a special, hot fire. This also lowers the target's Sp. Atk stat."
move_desc.mysticalpower: "The user attacks by emitting a mysterious power. This also boosts the user's Sp. Atk stat."
move_desc.nastyplot: "The user stimulates its brain by thinking bad thoughts. This sharply boosts the user's Sp. Atk stat."
move_desc.naturalgift: "The user draws power to attack by using its held Berry. The Berry determines the move's type and power."
move_desc.naturepower: "This attack makes use of nature's power. Its effects vary depending on the user's environment."
move_desc.naturesmadness: "The user hits the target with the full wrath of nature. This cuts the target's HP in half."
move_desc.needlearm: "The user attacks by wildly swinging its thorny arms. This may also make the target flinch."
move_desc.neverendingnightmare: "Deep-seated grudges summoned by the user's Z-Power trap the target. The power varies, depending on the original move."
move_desc.nightdaze: "The user looses a pitch-black shock wave at the target to inflict damage. This may also lower the target's accuracy."
move_desc.nightmare: "A sleeping target sees a nightmare that inflicts some damage every turn."
move_desc.nightshade: "The user makes the target see a frightening mirage. It inflicts damage equal to the user's level."
move_desc.nightslash: "The user slashes the target the instant an opportunity arises. This move has a heightened chance of landing a critical hit."
move_desc.nobleroar: "Letting out a noble roar, the user intimidates the target and lowers the target's Attack and Sp. Atk stats."
move_desc.noretreat: "This move boosts all the user's stats but prevents the user from switching out or fleeing."
move_desc.nuzzle: "The user attacks by nuzzling its electrified cheeks against the target. This also leaves the target with paralysis."
move_desc.oblivionwing: "The user absorbs the target's HP. The user's HP is restored by over half the damage taken by the target."
move_desc.obstruct: "This move enables the user to protect itself from all attacks. Its chance of failing rises if used in succession. Direct contact harshly lowers the attacker's Defense stat."
move_desc.oceanicoperetta: "The user, Primarina, summons a massive amount of water using its Z-Power and attacks the target with full force."
move_desc.octazooka: "The user attacks by spraying ink in the target's face. This may also lower the target's accuracy."
move_desc.octolock: "The user locks the target in and prevents it from fleeing. This move also lowers the target's Defense and Sp. Def every turn."
move_desc.odorsleuth: "Enables a Ghost-type target to be hit by Normal- and Fighting-type attacks. This also enables an evasive target to be hit."
move_desc.ominouswind: "The user blasts the target with a gust of repulsive wind. This may also raise all the user's stats at once."
move_desc.orderup: "The user attacks with elegant poise. If the user has a Tatsugiri in its mouth, this move boosts one of the user's stats based on the Tatsugiri's form."
move_desc.originpulse: "The user attacks opposing Pokémon with countless beams of light that glow a deep and brilliant blue."
move_desc.outrage: "The user rampages and attacks for two to three turns. The user then becomes confused."
move_desc.overdrive: "The user attacks opposing Pokémon by twanging a guitar or bass guitar, causing a huge echo and strong vibration."
move_desc.overheat: "The user attacks the target with all its might. The recoil from this move harshly lowers the user's Sp. Atk stat."
move_desc.painsplit: "The user adds its HP to the target's HP, then equally splits the combined HP between the target and itself."
move_desc.paraboliccharge: "The user attacks everything around it. The user's HP is restored by half the damage taken by those hit."
move_desc.partingshot: "With a parting threat, the user lowers the target's Attack and Sp. Atk stats. Then it switches places with a party Pokémon in waiting."
move_desc.payback: "The user stores power, then attacks. This move's power is doubled if the user moves after the target."
move_desc.payday: "Coins are hurled at the target to inflict damage. Money is earned after the battle."
move_desc.peck: "The target is jabbed with a sharply pointed beak or horn to inflict damage."
move_desc.perishsong: "Any Pokémon that hears this song faints in three turns, unless it switches out of battle."
move_desc.petalblizzard: "The user stirs up a violent petal blizzard and damages everything around it."
move_desc.petaldance: "The user attacks the target by scattering petals for two to three turns. The user then becomes confused."
move_desc.phantomforce: "The user vanishes somewhere, then strikes the target on the next turn. This move hits even if the target protects itself."
move_desc.photongeyser: "The user attacks the target with a pillar of light. This move inflicts damage using the Attack or Sp. Atk stat— whichever is higher for the user."
move_desc.pikapapow: "The more Pikachu loves its Trainer, the greater the move's power. It never misses."
move_desc.pinmissile: "The user attacks by shooting sharp spikes at the target. This move hits two to five times in a row."
move_desc.plasmafists: "The user attacks with electrically charged fists. This move changes Normal-type moves to Electric-type moves."
move_desc.playnice: "The user and the target become friends, and the target loses its will to fight. This lowers the target's Attack stat."
move_desc.playrough: "The user attacks by playing rough with the target. This may also lower the target's Attack stat."
move_desc.pluck: "The user attacks by pecking the target. If the target is holding a Berry, the user eats it and gains its effect."
move_desc.poisonfang: "The user bites the target with toxic fangs. This may also leave the target badly poisoned."
move_desc.poisongas: "A cloud of poison gas is sprayed in the faces of opposing Pokémon, poisoning those it hits."
move_desc.poisonjab: "The target is stabbed with a tentacle, an arm, or the like steeped in poison. This may also poison the target."
move_desc.poisonpowder: "The user scatters a cloud of poisonous dust that poisons the target."
move_desc.poisonsting: "The user stabs the target with a poisonous stinger to inflict damage. This may also poison the target."
move_desc.poisontail: "The user hits the target with its tail. This move has a heightened chance of landing a critical hit and may also poison the target."
move_desc.pollenpuff: "The user attacks the enemy with a pollen puff that explodes. If the target is an ally, it gives the ally a pollen puff that restores its HP instead."
move_desc.poltergeist: "The user attacks by controlling the target's item. This move fails if the target isn't holding an item."
move_desc.populationbomb: "The user's fellows gather in droves to perform a combo attack that hits the target one to ten times in a row."
move_desc.pounce: "The user attacks by pouncing on the target. This also lowers the target's Speed stat."
move_desc.pound: "The target is physically pounded with a long tail, a foreleg, or the like."
move_desc.powder: "The user covers the target in a combustible powder. If the target uses a Fire-type move, the powder explodes and damages the target."
move_desc.powdersnow: "The user attacks with a chilling gust of powdery snow. This may also leave opposing Pokémon frozen."
move_desc.powergem: "The user attacks with a ray of light that sparkles as if it were made of gemstones."
move_desc.powershift: "The user swaps its Attack and Defense stats."
move_desc.powersplit: "The user employs its psychic power to average its Attack and Sp. Atk stats with those of the target."
move_desc.powerswap: "The user employs its psychic power to switch changes to its Attack and Sp. Atk stats with the target."
move_desc.powertrick: "The user employs its psychic power to switch its Attack stat with its Defense stat."
move_desc.powertrip: "The user boasts its strength and attacks the target. The more the user's stats are boosted, the greater the move's power."
move_desc.poweruppunch: "Striking opponents over and over makes the user's fists harder. Hitting a target raises the Attack stat."
move_desc.powerwhip: "The user violently whirls its vines, tentacles, or the like to lash the target."
move_desc.precipiceblades: "The user attacks opposing Pokémon by manifesting the power of the land in fearsome blades of stone."
move_desc.present: "The user attacks by giving the target a gift with a hidden trap. The gift restores HP sometimes, however."
move_desc.prismaticlaser: "The user shoots powerful lasers using the power of a prism. The user can't move on the next turn."
move_desc.protect: "This move enables the user to protect itself from all attacks. Its chance of failing rises if it is used in succession."
move_desc.psybeam: "The target is attacked with a peculiar ray. This may also confuse the target."
move_desc.psyblade: "The user rends the target with an ethereal blade. This move's power is boosted by 50 percent if the user is on Electric Terrain."
move_desc.psychic: "The target is hit with a strong telekinetic force to inflict damage. This may also lower the target's Sp. Def stat."
move_desc.psychicfangs: "The user attacks by biting the target with its psychic capabilities. This move can also break barriers, such as Light Screen and Reflect."
move_desc.psychicnoise: "The user attacks the target with unpleasant sound waves. For two turns, the target is prevented from recovering HP through moves, Abilities, or held items."
move_desc.psychicterrain: "This protects Pokémon on the ground from priority moves and powers up Psychic-type moves for five turns."
move_desc.psychoboost: "The user attacks the target with all its might. The recoil from this move harshly lowers the user's Sp. Atk stat."
move_desc.psychocut: "The user tears at the target with blades formed by psychic power. This move has a heightened chance of landing a critical hit."
move_desc.psychoshift: "Using its psychic power of suggestion, the user transfers its status conditions to the target."
move_desc.psychup: "The user hypnotizes itself into copying any stat change made by the target."
move_desc.psyshieldbash: "Cloaking itself in psychic energy, the user slams into the target. This also boosts the user's Defense stat."
move_desc.psyshock: "The user materializes an odd psychic wave to attack the target. This move deals physical damage."
move_desc.psystrike: "The user materializes an odd psychic wave to attack the target. This move deals physical damage."
move_desc.psywave: "The target is attacked with an odd psychic wave. The attack varies in intensity."
move_desc.pulverizingpancake: "Z-Power brings out the true capabilities of the user, Snorlax. The Pokémon moves its enormous body energetically and attacks the target with full force."
move_desc.punishment: "The more the target has powered up with stat changes, the greater the move's power."
move_desc.purify: "The user cures the target's status condition. If the move succeeds, it also restores the user's own HP."
move_desc.pursuit: "The power of this attack move is doubled if it's used on a target that's switching out of battle."
move_desc.pyroball: "The user attacks by igniting a small stone and launching it as a fiery ball at the target. This may also leave the target with a burn."
move_desc.quash: "The user suppresses the target and makes its move go last."
move_desc.quickattack: "The user lunges at the target to inflict damage, moving at blinding speed. This move always goes first."
move_desc.quickguard: "The user protects itself and its allies from priority moves."
move_desc.quiverdance: "The user lightly performs a beautiful, mystic dance. This boosts the user's Sp. Atk, Sp. Def, and Speed stats."
move_desc.rage: "As long as this move is in use, the power of rage raises the Attack stat each time the user is hit in battle."
move_desc.ragefist: "The user converts its rage into energy to attack. The more times the user has been hit by attacks, the greater the move's power."
move_desc.ragepowder: "The user scatters a cloud of irritating powder to draw attention to itself. Opposing Pokémon aim only at the user."
move_desc.ragingbull: "The user performs a tackle like a raging bull. This move's type depends on the user's form. It can also break barriers, such as Light Screen and Reflect."
move_desc.ragingfury: "The user rampages around spewing flames for two to three turns. The user then becomes confused."
move_desc.raindance: "The user summons a heavy rain that falls for five turns, powering up Water-type attacks. The rain also lowers the power of Fire-type attacks."
move_desc.rapidspin: "The user performs a spin attack that can also eliminate the effects of such moves as Bind, Wrap, and Leech Seed. This also boosts the user's Speed stat."
move_desc.razorleaf: "Sharp-edged leaves are launched to slash at opposing Pokémon. This move has a heightened chance of landing a critical hit."
move_desc.razorshell: "The user cuts the target with sharp shells to inflict damage. This may also lower the target's Defense stat."
move_desc.razorwind: "In this two-turn attack, blades of wind hit opposing Pokémon on the second turn. Critical hits land more easily."
move_desc.recover: "The user regenerates its cells, restoring its own HP by up to half its max HP."
move_desc.recycle: "The user recycles a held item that has been used in battle so it can be used again."
move_desc.reflect: "A wondrous wall of light is put up to reduce damage from physical moves for five turns."
move_desc.reflecttype: "The user reflects the target's type to become the same type as the target."
move_desc.refresh: "The user rests to cure itself of poisoning, a burn, or paralysis."
move_desc.relicsong: "The user sings an ancient song and attacks by appealing to the hearts of the listening opposing Pokémon. This may also induce sleep."
move_desc.rest: "The user goes to sleep for two turns. This fully restores the user's HP and cures any status conditions."
move_desc.retaliate: "The user takes revenge for a fainted ally. This move's power is boosted if an ally fainted in the previous turn."
move_desc.return: "This full-power attack grows more powerful the more the user likes its Trainer."
move_desc.revelationdance: "The user attacks the target by dancing with all its might. This move becomes the same type as the user's type."
move_desc.revenge: "This attack move's power is doubled if the user has been hurt by the opponent in the same turn."
move_desc.reversal: "An all-out attack that becomes more powerful the less HP the user has."
move_desc.revivalblessing: "The user bestows a loving blessing, reviving a party Pokémon that has fainted and restoring half that Pokémon's max HP."
move_desc.risingvoltage: "The user attacks with electricity rising from the ground. This move's power is doubled if the target is on Electric Terrain."
move_desc.roar: "The target is scared off, and a different Pokémon is dragged out. In the wild, this ends a battle against a single Pokémon."
move_desc.roaroftime: "The user blasts the target with power that distorts even time. The user can't move on the next turn."
move_desc.rockblast: "The user attacks by hurling hard rocks at the target. This move hits two to five times in a row."
move_desc.rockclimb: "The user attacks the target by smashing into it with incredible force. This may also confuse the target."
move_desc.rockpolish: "The user polishes its body to reduce drag. This sharply boosts the user's Speed stat."
move_desc.rockslide: "Large boulders are hurled at opposing Pokémon to inflict damage. This may also make the opposing Pokémon flinch."
move_desc.rocksmash: "The user attacks with a punch. This may also lower the target's Defense stat."
move_desc.rockthrow: "The user picks up and throws a small rock at the target to inflict damage."
move_desc.rocktomb: "The user hurls boulders at the target to inflict damage. This also lowers the target's Speed stat by cutting off its movement."
move_desc.rockwrecker: "The user launches a huge boulder at the target to attack. The user can't move on the next turn."
move_desc.roleplay: "The user mimics the target completely, copying the target's Ability."
move_desc.rollingkick: "The user lashes out with a quick, spinning kick. This may also make the target flinch."
move_desc.rollout: "The user continually rolls into the target over five turns. This attack becomes more powerful each time it hits."
move_desc.roost: "The user lands and rests its body. This move restores the user's HP by up to half its max HP."
move_desc.rototiller: "Tilling the soil, the user makes it easier for plants to grow. This raises the Attack and Sp. Atk stats of Grass-type Pokémon."
move_desc.round: "The user attacks the target with a song. If others use this move, they will act immediately after the initial user, and the power of their Rounds will be boosted."
move_desc.ruination: "The user summons a ruinous disaster. This cuts the target's HP in half."
move_desc.sacredfire: "The target is razed with a mystical fire of great intensity. This may also leave the target with a burn."
move_desc.sacredsword: "The user attacks by slicing with a sword. The target's stat changes don't affect the damage inflicted by this move."
move_desc.safeguard: "The user creates a protective field that prevents status conditions for five turns."
move_desc.saltcure: "The user salt cures the target, inflicting damage every turn. Steel and Water types are more strongly affected by this move."
move_desc.sandattack: "Sand is hurled in the target's face, lowering the target's accuracy."
move_desc.sandsearstorm: "The user attacks by wrapping opposing Pokémon in fierce winds and searingly hot sand. This may also leave them with a burn."
move_desc.sandstorm: "A five-turn sandstorm is summoned to damage all Pokémon except Rock, Ground, and Steel types. The sandstorm also boosts the Sp. Def stats of Rock types."
move_desc.sandtomb: "The user traps the target inside a harshly raging sandstorm that inflicts damage for four to five turns."
move_desc.sappyseed: "The user grows a gigantic stalk that scatters seeds to attack the target. The seeds drain the target's HP every turn."
move_desc.savagespinout: "The user binds the target with full force with threads of silk that the user spits using its Z-Power. The power varies, depending on the original move."
move_desc.scald: "The user attacks by shooting boiling hot water at the target. This may also leave the target with a burn."
move_desc.scaleshot: "The user attacks by shooting scales two to five times in a row. This move boosts the user's Speed stat but lowers its Defense stat."
move_desc.scaryface: "The user frightens the target with a scary face to harshly lower its Speed stat."
move_desc.scorchingsands: "The user throws scorching sand at the target to attack. This may also leave the target with a burn."
move_desc.scratch: "Hard, pointed, sharp claws rake the target to inflict damage."
move_desc.screech: "An earsplitting screech harshly lowers the target's Defense stat."
move_desc.searingshot: "The user torches everything around it in an inferno of scarlet flames. This may also leave those it hits with a burn."
move_desc.searingsunrazesmash: "After obtaining Z-Power, the user, Solgaleo, attacks the target with full force. This move can ignore the effect of the target's Ability."
move_desc.secretpower: "The additional effects of this attack depend upon where it was used."
move_desc.secretsword: "The user cuts with its long horn. The odd power contained in the horn deals physical damage to the target."
move_desc.seedbomb: "The user attacks by slamming a barrage of hard-shelled seeds down on the target from above."
move_desc.seedflare: "The user emits a shock wave from its body to attack the target. This may also harshly lower the target's Sp. Def stat."
move_desc.seismictoss: "The target is thrown using the power of gravity. It inflicts damage equal to the user's level."
move_desc.selfdestruct: "The user attacks everything around it by causing an explosion. The user faints upon using this move."
move_desc.shadowball: "The user attacks by hurling a shadowy blob at the target. This may also lower the target's Sp. Def stat."
move_desc.shadowbone: "The user attacks by beating the target with a bone that contains a spirit. This may also lower the target's Defense stat."
move_desc.shadowclaw: "The user attacks by slashing the target with a sharp claw made from shadows. This move has a heightened chance of landing a critical hit."
move_desc.shadowforce: "The user disappears on the first turn, then attacks on the next turn. This move hits even if the target protects itself."
move_desc.shadowpunch: "The user throws a punch from the shadows. This attack never misses."
move_desc.shadowsneak: "The user extends its shadow and attacks the target from behind. This move always goes first."
move_desc.sharpen: "The user makes its edges more jagged, which raises its Attack stat."
move_desc.shatteredpsyche: "The user controls the target with its Z-Power and hurts the target with full force. The power varies, depending on the original move."
move_desc.shedtail: "The user creates a substitute for itself using its own HP before switching places with a party Pokémon in waiting."
move_desc.sheercold: "The target faints instantly. This move is less likely to hit the target if used by Pokémon other than Ice types."
move_desc.shellsidearm: "This move is either physical or special—whichever will inflict more damage. This may also poison the target."
move_desc.shellsmash: "The user breaks its shell, which lowers its Defense and Sp. Def stats but sharply boosts its Attack, Sp. Atk, and Speed stats."
move_desc.shelltrap: "The user sets a shell trap. If the user is hit by a physical move, the trap will explode and inflict damage on opposing Pokémon."
move_desc.shelter: "The user makes its skin as hard as an iron shield, sharply boosting its Defense stat."
move_desc.shiftgear: "The user rotates its gears, boosting its Attack stat and sharply boosting its Speed stat."
move_desc.shockwave: "The user strikes the target with a quick jolt of electricity. This attack never misses."
move_desc.shoreup: "The user restores its own HP by up to half its max HP. It regains more HP in a sandstorm."
move_desc.signalbeam: "The user attacks with a sinister beam of light. This may also confuse the target."
move_desc.silktrap: "The user spins a silken trap, protecting itself from damage while lowering the Speed stat of any attacker that makes direct contact."
move_desc.silverwind: "The target is attacked with powdery scales blown by the wind. This may also raise all the user's stats."
move_desc.simplebeam: "The user emits a mysterious psychic wave that changes the target's Ability to Simple."
move_desc.sing: "A soothing lullaby is sung in a beautiful voice that puts the target to sleep."
move_desc.sinisterarrowraid: "The user, Decidueye, creates countless arrows using its Z-Power and shoots the target with full force."
move_desc.sizzlyslide: "The user cloaks itself in fire and charges at the target. This also leaves the target with a burn."
move_desc.sketch: "This move enables the user to permanently learn the move last used by the target. Once used, Sketch disappears."
move_desc.skillswap: "The user employs its psychic power to exchange Abilities with the target."
move_desc.skittersmack: "The user skitters behind the target to attack. This also lowers the target's Sp. Atk stat."
move_desc.skullbash: "The user tucks in its head to raise its Defense stat on the first turn, then rams the target on the next turn."
move_desc.skyattack: "The user attacks the turn after using this move. This move has a heightened chance of landing a critical hit and may also make the target flinch."
move_desc.skydrop: "The user takes the target into the sky, then drops it during the next turn. The target cannot attack while in the sky."
move_desc.skyuppercut: "The user attacks the target with an uppercut thrown skyward with force."
move_desc.slackoff: "The user slacks off, restoring its own HP by up to half its max HP."
move_desc.slam: "The target is slammed with a long tail, vines, or the like to inflict damage."
move_desc.slash: "The target is attacked with a slash of claws, scythes, or the like. This move has a heightened chance of landing a critical hit."
move_desc.sleeppowder: "The user scatters a cloud of soporific dust that puts the target to sleep."
move_desc.sleeptalk: "The user randomly uses one of the moves it knows. This move can only be used while the user is asleep."
move_desc.sludge: "The user hurls unsanitary sludge at the target to inflict damage. This may also poison the target."
move_desc.sludgebomb: "The user hurls unsanitary sludge at the target to inflict damage. This may also poison the target."
move_desc.sludgewave: "The user strikes everything around it by swamping the area with a giant sludge wave. This may also poison those it hits."
move_desc.smackdown: "The user throws a stone or similar projectile to attack the target. If the target is in the air, it will be knocked down to the ground."
move_desc.smartstrike: "The user stabs the target with a sharp horn. This attack never misses."
move_desc.smellingsalts: "This attack's power is doubled when used on a target with paralysis. This also cures the target's paralysis, however."
move_desc.smog: "The target is attacked with a discharge of filthy gases. This may also poison the target."
move_desc.smokescreen: "The user releases an obscuring cloud of smoke or ink. This lowers the target's accuracy."
move_desc.snaptrap: "The user snares the target in a snap trap that inflicts damage for four to five turns."
move_desc.snarl: "The user yells as if it's ranting about something, which lowers the Sp. Atk stats of opposing Pokémon."
move_desc.snatch: "The user steals the effects of any attempts to use a healing or stat-changing move."
move_desc.snipeshot: "The user ignores the effects of opposing Pokémon's moves and Abilities that draw in moves, allowing this move to hit the chosen target."
move_desc.snore: "This attack can be used only if the user is asleep. The harsh noise may also make the target flinch."
move_desc.snowscape: "The user summons a snowstorm lasting five turns. This boosts the Defense stats of Ice types."
move_desc.soak: "The user shoots a torrent of water that changes the target's type to Water."
move_desc.softboiled: "The user restores its own HP by up to half its max HP."
move_desc.solarbeam: "The user gathers light on the first turn, then blasts a bundled beam on the next turn."
move_desc.solarblade: "The user gathers light on the first turn, then fills a blade with the light's energy and attacks on the next turn."
move_desc.sonicboom: "The target is hit with a destructive shock wave that always inflicts 20 HP damage."
move_desc.soulstealing7starstrike: "After obtaining Z-Power, the user, Marshadow, punches and kicks the target consecutively with full force."
move_desc.spacialrend: "The user tears the target along with the space around it. This move has a heightened chance of landing a critical hit."
move_desc.spark: "The user attacks the target with an electrically charged tackle. This may also leave the target with paralysis."
move_desc.sparklingaria: "The user bursts into song, emitting many bubbles. Any Pokémon suffering from a burn will be cured by the touch of these bubbles."
move_desc.sparklyswirl: "The user attacks the target by wrapping it with a whirlwind of an overpowering scent. This also heals all status conditions of the user's party."
move_desc.spectralthief: "The user hides in the target's shadow, steals the target's stat boosts, and then attacks."
move_desc.speedswap: "The user exchanges Speed stats with the target."
move_desc.spicyextract: "The user emits an incredibly spicy extract, sharply boosting the target's Attack stat and harshly lowering the target's Defense stat."
move_desc.spiderweb: "The user ensnares the target with thin, gooey silk so it can't flee from battle."
move_desc.spikecannon: "Sharp spikes are shot at the target in rapid succession. They hit two to five times in a row."
move_desc.spikes: "The user lays a trap of spikes at the feet of the opposing team. The spikes will damage opposing Pokémon that switch into battle."
move_desc.spikyshield: "In addition to protecting the user from attacks, this move also damages any attacker that makes direct contact."
move_desc.spinout: "The user spins furiously by straining its legs, inflicting damage on the target. This also harshly lowers the user's Speed stat."
move_desc.spiritbreak: "The user attacks the target with so much force that it could break the target's spirit. This also lowers the target's Sp. Atk stat."
move_desc.spiritshackle: "The user attacks while simultaneously stitching the target's shadow to the ground to prevent the target from fleeing."
move_desc.spite: "The user unleashes its grudge on the move last used by the target by cutting 4 PP from it."
move_desc.spitup: "The power stored using the move Stockpile is released at once in an attack. The more power is stored, the greater the move's power."
move_desc.splash: "The user just flops and splashes around to no effect at all..."
move_desc.splinteredstormshards: "After obtaining Z-Power, the user, Lycanroc, attacks the target with full force. This move negates the effect on the battlefield."
move_desc.splishysplash: "The user charges a huge wave with electricity and hits the opposing Pokémon with the wave. This may also leave the opposing Pokémon with paralysis."
move_desc.spore: "The user scatters bursts of spores that induce sleep."
move_desc.spotlight: "The user shines a spotlight on the target so that only the target will be attacked during the turn."
move_desc.springtidestorm: "The user attacks by wrapping opposing Pokémon in fierce winds brimming with love and hate. This may also lower their Attack stats."
move_desc.stealthrock: "The user lays a trap of levitating stones around the opposing team. The trap damages opposing Pokémon that switch into battle."
move_desc.steameruption: "The user immerses the target in superheated steam. This may also leave the target with a burn."
move_desc.steamroller: "The user crushes its target by rolling over the target with its rolled-up body. This may also make the target flinch."
move_desc.steelbeam: "The user fires a beam of steel that it collected from its entire body. This also damages the user."
move_desc.steelroller: "The user attacks while destroying the terrain. This move fails if the ground hasn't turned into a terrain."
move_desc.steelwing: "The target is hit with wings of steel. This may also boost the user's Defense stat."
move_desc.stickyweb: "The user weaves a sticky net around the opposing team, which lowers their Speed stats upon switching into battle."
move_desc.stockpile: "The user stores power and boosts its Defense and Sp. Def stats. This move can be used up to three times."
move_desc.stokedsparksurfer: "After obtaining Z-Power, the user, Alolan Raichu, attacks the target with full force. This move leaves the target with paralysis."
move_desc.stomp: "The user attacks by stomping on the target with a big foot. This may also make the target flinch."
move_desc.stompingtantrum: "Driven by frustration, the user attacks the target. This move's power is doubled if the user's previous move failed."
move_desc.stoneaxe: "The user swings its stone axes at the target. Stone splinters left behind by this attack float around the target."
move_desc.stoneedge: "The user stabs the target with sharpened stones. This move has a heightened chance of landing a critical hit."
move_desc.storedpower: "The user attacks the target with stored power. The more the user's stats are boosted, the greater the move's power."
move_desc.stormthrow: "The user attacks by striking the target with a fierce blow. This move always lands a critical hit."
move_desc.strangesteam: "The user attacks the target by emitting steam. This may also confuse the target."
move_desc.strength: "The target is slugged with a punch thrown at maximum power."
move_desc.strengthsap: "The user restores its own HP by the same amount as the target's Attack stat. It then lowers the target's Attack stat."
move_desc.stringshot: "The user blows silk from its mouth that binds opposing Pokémon and harshly lowers their Speed stats."
move_desc.struggle: "This attack is used in desperation only if the user has no remaining PP. It also damages the user a little."
move_desc.strugglebug: "The user attacks by struggling against opposing Pokémon. This also lowers their Sp. Atk stats."
move_desc.stuffcheeks: "The user eats its held Berry, then sharply boosts its Defense stat."
move_desc.stunspore: "The user scatters a cloud of numbing powder that paralyzes the target."
move_desc.submission: "The user grabs the target and recklessly dives for the ground. This also damages the user a little."
move_desc.substitute: "The user creates a substitute for itself using some of its own HP. The substitute serves as the user's decoy."
move_desc.subzeroslammer: "The user dramatically drops the temperature using its Z-Power and freezes the target with full force. The power varies, depending on the original move."
move_desc.suckerpunch: "This move enables the user to attack first. This move fails if the target is not readying an attack."
move_desc.sunnyday: "The user intensifies the sun for five turns, powering up Fire-type attacks. The sunlight also lowers the power of Water-type attacks."
move_desc.sunsteelstrike: "The user slams into the target with the force of a meteor. This move can be used on the target regardless of its Ability."
move_desc.supercellslam: "The user electrifies its body and drops onto the target to inflict damage. If this move misses, the user takes damage instead."
move_desc.superfang: "The user chomps hard on the target with its sharp front fangs. This cuts the target's HP in half."
move_desc.superpower: "The user attacks the target with great power. This also lowers the user's Attack and Defense stats."
move_desc.supersonic: "The user generates odd sound waves from its body that confuse the target."
move_desc.supersonicskystrike: "The user soars up with its Z-Power and plummets toward the target at full speed. The power varies, depending on the original move."
move_desc.surf: "The user attacks everything around it by swamping its surroundings with a giant wave."
move_desc.surgingstrikes: "The user, having mastered the Water style, strikes the target with a flowing motion three times in a row. This move always lands a critical hit."
move_desc.swagger: "The user enrages and confuses the target. However, this also sharply boosts the target's Attack stat."
move_desc.swallow: "The power stored using the move Stockpile is absorbed by the user to restore its own HP. The more power is stored, the more HP is restored."
move_desc.sweetkiss: "The user kisses the target with a sweet, angelic cuteness that causes confusion."
move_desc.sweetscent: "The user releases a scent that harshly lowers opposing Pokémon's evasiveness."
move_desc.swift: "Star-shaped rays are shot at opposing Pokémon. This attack never misses."
move_desc.switcheroo: "The user trades held items with the target faster than the eye can follow."
move_desc.swordsdance: "A frenetic dance to uplift the fighting spirit. This sharply boosts the user's Attack stat."
move_desc.synchronoise: "Using an odd shock wave, the user inflicts damage on any Pokémon of the same type in the area around it."
move_desc.synthesis: "The user restores its own HP. The amount of HP regained varies with the weather."
move_desc.syrupbomb: "The user sets off an explosion of sticky candy syrup, which coats the target and causes the target's Speed stat to drop each turn for three turns."
move_desc.tachyoncutter: "The user attacks by launching particle blades at the target twice in a row. This attack never misses."
move_desc.tackle: "A physical attack in which the user charges and slams into the target with its whole body."
move_desc.tailglow: "The user stares at flashing lights to focus its mind, drastically boosting its Sp. Atk stat."
move_desc.tailslap: "The user attacks by striking the target with its hard tail. This move hits two to five times in a row."
move_desc.tailwhip: "The user wags its tail cutely, making opposing Pokémon less wary. This lowers their Defense stats."
move_desc.tailwind: "The user whips up a turbulent whirlwind that boosts the Speed stats of itself and its allies for four turns."
move_desc.takedown: "A reckless full-body charge attack for slamming into the target. This also damages the user a little."
move_desc.takeheart: "The user lifts its spirits, curing its own status conditions and boosting its Sp. Atk and Sp. Def stats."
move_desc.tarshot: "The user pours sticky tar over the target, lowering the target's Speed stat. The target becomes weaker to Fire-type moves."
move_desc.taunt: "The target is taunted into a rage that allows it to use only attack moves for three turns."
move_desc.tearfullook: "The user gets teary-eyed to make the target lose its combative spirit. This lowers the target's Attack and Sp. Atk stats."
move_desc.teatime: "The user has teatime with all the Pokémon currently in the battle. Each Pokémon eats its held Berry."
move_desc.technoblast: "The user attacks by firing a beam of light at the target. This move's type changes depending on the kind of drive held by the user."
move_desc.tectonicrage: "The user burrows deep into the ground and slams into the target with the full force of its Z-Power. The power varies, depending on the original move."
move_desc.teeterdance: "The user performs a wobbly dance that confuses every Pokémon around it."
move_desc.telekinesis: "The user makes the target float with its psychic power. The target is easier to hit for three turns."
move_desc.teleport: "The user switches places with a party Pokémon in waiting, if any. If a wild Pokémon uses this move, it flees."
move_desc.temperflare: "Spurred by desperation, the user attacks the target. This move's power is doubled if the user's previous move failed."
move_desc.terablast: "If the user has Terastallized, it unleashes energy of its Tera Type. This move inflicts damage using the Attack or Sp. Atk stat—whichever is higher for the user."
move_desc.terastarstorm: "With the power of its crystals, the user bombards and eliminates the target. When used by Terapagos in its Stellar Form, this move damages all opposing Pokémon."
move_desc.terrainpulse: "The user utilizes the energy of the terrain to attack. This move's type and power change depending on the terrain at the time the move is used."
move_desc.thief: "The user attacks and steals the target's held item simultaneously. The user can't steal anything if it already holds an item."
move_desc.thousandarrows: "This move can hit opposing Pokémon that are in the air. Those Pokémon will be knocked down to the ground."
move_desc.thousandwaves: "The user attacks with a wave that crawls along the ground. Those it hits can't flee from battle."
move_desc.thrash: "The user rampages and attacks for two to three turns. The user then becomes confused."
move_desc.throatchop: "The user attacks the target's throat, and the resultant suffering prevents the target from using sound-based moves for two turns."
move_desc.thunder: "A wicked thunderbolt is dropped on the target to inflict damage. This may also leave the target with paralysis."
move_desc.thunderbolt: "The user attacks the target with a strong electric blast. This may also leave the target with paralysis."
move_desc.thundercage: "The user traps the target inside a cage of sparking electricity that inflicts damage for four to five turns."
move_desc.thunderclap: "This move enables the user to attack first with a jolt of electricity. This move fails if the target is not readying an attack."
move_desc.thunderfang: "The user bites with electrified fangs. This may also make the target flinch or leave it with paralysis."
move_desc.thunderouskick: "The user overwhelms the target with lightning-like movement before delivering a kick. This also lowers the target's Defense stat."
move_desc.thunderpunch: "The target is attacked with an electrified punch. This may also leave the target with paralysis."
move_desc.thundershock: "The user attacks the target with a jolt of electricity. This may also leave the target with paralysis."
move_desc.thunderwave: "The user launches a weak jolt of electricity that paralyzes the target."
move_desc.tickle: "The user tickles the target into laughing, lowering its Attack and Defense stats."
move_desc.tidyup: "The user tidies up and removes the effects of Spikes, Stealth Rock, Sticky Web, Toxic Spikes, and Substitute. This also boosts the user's Attack and Speed stats."
move_desc.topsyturvy: "All stat changes affecting the target turn topsy-turvy and become the opposite of what they were."
move_desc.torchsong: "The user blows out raging flames as if singing a song, scorching the target. This also boosts the user's Sp. Atk stat."
move_desc.torment: "The user torments and enrages the target, making it incapable of using the same move twice in a row."
move_desc.toxic: "A move that leaves the target badly poisoned. Its poison damage worsens every turn."
move_desc.toxicspikes: "The user lays a trap of poison spikes at the feet of the opposing team. The spikes will poison opposing Pokémon that switch into battle."
move_desc.toxicthread: "The user shoots poisonous threads to poison the target and lower the target's Speed stat."
move_desc.trailblaze: "The user attacks suddenly as if leaping out from tall grass. The user's nimble footwork boosts its Speed stat."
move_desc.transform: "The user transforms into a copy of the target, right down to having the same move set."
move_desc.triattack: "The user strikes with a simultaneous three-beam attack. This may also burn, freeze, or paralyze the target."
move_desc.trick: "The user catches the target off guard and swaps the target's held item with its own."
move_desc.trickortreat: "The user takes the target trick-or-treating. This adds Ghost type to the target's type."
move_desc.trickroom: "The user creates a bizarre area in which slower Pokémon get to move first for five turns."
move_desc.triplearrows: "The user kicks, then fires three arrows. This move has a heightened chance of landing a critical hit and may also lower the target's Defense stat or make it flinch."
move_desc.tripleaxel: "A consecutive three-kick attack that becomes more powerful with each successful hit."
move_desc.tripledive: "The user performs a perfectly timed triple dive, hitting the target with splashes of water three times in a row."
move_desc.triplekick: "A consecutive three-kick attack that becomes more powerful with each successful hit."
move_desc.tropkick: "The user lands an intense kick of tropical origins on the target. This also lowers the target's Attack stat."
move_desc.trumpcard: "The fewer PP this move has, the greater its power."
move_desc.twinbeam: "The user shoots mystical beams from its eyes to inflict damage. The target is hit twice in a row."
move_desc.twineedle: "The user damages the target twice in succession by jabbing it with two spikes. This may also poison the target."
move_desc.twinkletackle: "The user creates a very charming space using its Z-Power and totally toys with the target. The power varies, depending on the original move."
move_desc.twister: "The user whips up a vicious tornado to tear at opposing Pokémon. This may also make them flinch."
move_desc.upperhand: "The user reacts to the target's movement and strikes with the heel of its palm, making the target flinch. This move fails if the target is not readying a priority move."
move_desc.uproar: "The user attacks in an uproar for three turns. During that time, no Pokémon can fall asleep."
move_desc.uturn: "After making its attack, the user rushes back to switch places with a party Pokémon in waiting."
move_desc.vacuumwave: "The user whirls its fists to send a wave of pure vacuum at the target. This move always goes first."
move_desc.vcreate: "The user emits a hot flame from its forehead and hurls itself at the target to inflict damage. This also lowers the user's Defense, Sp. Def, and Speed stats."
move_desc.veeveevolley: "The more Eevee loves its Trainer, the greater the move's power. It never misses."
move_desc.venomdrench: "Opposing Pokémon are drenched in an odd poisonous liquid. This lowers the Attack, Sp. Atk, and Speed stats of a poisoned target."
move_desc.venoshock: "The user drenches the target in a special poisonous liquid. This move's power is doubled if the target is poisoned."
move_desc.victorydance: "The user performs an intense dance to usher in victory, boosting its Attack, Defense, and Speed stats."
move_desc.vinewhip: "The target is struck with slender, whiplike vines to inflict damage."
move_desc.visegrip: "The target is gripped and squeezed from both sides to inflict damage."
move_desc.vitalthrow: "The user attacks last. In return, this throw move never misses."
move_desc.voltswitch: "After making its attack, the user rushes back to switch places with a party Pokémon in waiting."
move_desc.volttackle: "The user electrifies itself and charges the target to inflict damage. This also damages the user quite a lot and may leave the target with paralysis."
move_desc.wakeupslap: "This attack inflicts big damage on a sleeping target. This also wakes the target up, however."
move_desc.waterfall: "The user charges at the target and may make it flinch."
move_desc.watergun: "The target is blasted with a forceful shot of water."
move_desc.waterpledge: "A column of water hits the target. When used with its fire counterpart, this move's power is boosted and a rainbow appears."
move_desc.waterpulse: "The user attacks the target with a pulsing blast of water. This may also confuse the target."
move_desc.watershuriken: "The user hits the target with throwing stars two to five times in a row. This move always goes first."
move_desc.watersport: "The user soaks the battlefield with water. This weakens Fire-type moves for five turns."
move_desc.waterspout: "The user spouts water to damage opposing Pokémon. The lower the user's HP, the lower the move's power."
move_desc.wavecrash: "The user shrouds itself in water and slams into the target with its whole body to inflict damage. This also damages the user quite a lot."
move_desc.weatherball: "This move's type and power change depending on the weather at the time the move is used."
move_desc.whirlpool: "The user traps the target inside a violent, swirling whirlpool that inflicts damage for four to five turns."
move_desc.whirlwind: "The target is blown away, and a different Pokémon is dragged out. In the wild, this ends a battle against a single Pokémon."
move_desc.wickedblow: "The user, having mastered the Dark style, strikes the target with a fierce blow. This move always lands a critical hit."
move_desc.wideguard: "The user and its allies are protected from wide-ranging attacks for one turn."
move_desc.wildboltstorm: "The user summons a thunderous tempest and savagely attacks with lightning and wind. This may also leave opposing Pokémon with paralysis."
move_desc.wildcharge: "The user shrouds itself in electricity and smashes into the target. This also damages the user a little."
move_desc.willowisp: "The user shoots a sinister flame at the target to inflict a burn."
move_desc.wingattack: "The target is struck with large, imposing wings spread wide to inflict damage."
move_desc.wish: "One turn after this move is used, the user's or its replacement's HP is restored by up to half the user's max HP."
move_desc.withdraw: "The user withdraws its body into its hard shell, boosting its Defense stat."
move_desc.wonderroom: "The user creates a bizarre area in which Pokémon's Defense and Sp. Def stats are swapped for five turns."
move_desc.woodhammer: "The user slams its rugged body into the target to attack. This also damages the user quite a lot."
move_desc.workup: "The user is roused, and its Attack and Sp. Atk stats are boosted."
move_desc.worryseed: "A seed that causes worry is planted on the target. It prevents sleep by making the target's Ability Insomnia."
move_desc.wrap: "A long body, vines, or the like are used to wrap and squeeze the target for four to five turns."
move_desc.wringout: "The user powerfully wrings the target. The more HP the target has, the greater the move's power."
move_desc.xscissor: "The user slashes at the target by crossing its scythes, claws, or the like as if they were a pair of scissors."
move_desc.yawn: "The user lets loose a huge yawn that lulls the target into falling asleep on the next turn."
move_desc.zapcannon: "The user attacks by firing an electric blast like a cannon. This also leaves the target with paralysis."
move_desc.zenheadbutt: "The user focuses its willpower to its head and attacks the target. This may also make the target flinch."
move_desc.zingzap: "The user crashes into the target, delivering a powerful electric shock. This may also make the target flinch."
move_desc.zippyzap: "The user attacks the target with bursts of electricity at high speed. This move always goes first and results in a critical hit."
