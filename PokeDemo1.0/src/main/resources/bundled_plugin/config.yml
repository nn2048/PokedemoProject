# 召唤热键扩展：
# - Shift+F（交换副手）仍可用（玩家可在客户端把“交换副手物品”改键为R）
# - 额外支持：潜行时切换到快捷栏 1-6，会召唤/切换对应队伍格子（无法区分“数字键”还是“滚轮”，因此潜行滚轮也会触发）
summon:
  hotbar-keys:
    enabled: true
    require-sneak: true
    cooldown-ms: 250
config-version: 49
loot-chests:
  master-ball-chance: 0.01
