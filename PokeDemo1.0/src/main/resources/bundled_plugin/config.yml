# PokeDemo configuration
storage:
  autosave-seconds: 30

# 视觉（资源包模型）参数
visuals:
  # ItemDisplay 相对精灵载体(狼)脚底的偏移（方块单位）
  # 若模型插进地里，把它调大一些（例如 0.45）
  model-offset-y: 0.5
  # 名字/等级 TextDisplay 的高度（方块单位）
  name-offset-y: 1.35
  # ItemDisplay 缩放（越大越大）
  scale: 2.0
  display-layers-enabled: true

spawns:
  enabled: true
  # Spawn method: VIRTUAL (encounter triggers GUI) or ENTITY (spawns wolf entities)
  mode: ENTITY
  per-player-cap: 8
  check-interval-ticks: 80
  spawn-radius: 24
  despawn-distance: 96
  # Worlds and dimensions allowed
  enabled-worlds:
  - world
  - world_nether
  - world_the_end
  buckets: {}
  weight-multipliers: {}
  table-file: spawns_all_exact_biomes.yml
  cobblemon-import:
    enabled: false

capture:
  # Use a custom item for poke balls
  ball-material: SNOWBALL
  ball-custom-model-data: 9001
  # Base multipliers by ball type key
  balls:
    POKE_BALL: 1.0
    GREAT_BALL: 1.5
    ULTRA_BALL: 2.0

battle:
  enabled: true
  # If true, attacking a wild entity starts a battle GUI instead of normal combat
  intercept-combat: true

# Species data loading:
# - Put JSON files in plugins/PokeDemo/species/
# - For demo, we ship a small built-in set in jar resources under /species_builtin/
#   and copy them on first run if folder is empty.


# 调试魔杖：调整模型大小/高度（按精灵种类写入配置并热更新）
control-wand:
  scale-step: 0.1
  y-step: 0.05
  min-scale: 0.1
  max-scale: 10.0
  item:
    material: STICK
    # 若你想给魔杖自己也套模型，可设置CMD；0表示不设置
    custom-model-data: 0

