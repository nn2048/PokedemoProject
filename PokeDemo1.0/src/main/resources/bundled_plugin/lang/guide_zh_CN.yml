books:
  welcome:
    title: PokeDemo 新手指南
    author: PtrMC
    pages:
    - |
      §d§l欢迎训练师来到 PokeDemo 的世界！§r

      §7本插件坚持开源免费。§r
      §c§l请勿从任何付费渠道获取本插件！§r
      §c§l严禁魔改后付费售卖！§r

      §7获取本书：§r
      §2三根木棍无序合成§r

      §7使用说明：§r
      §3右键打开书本§r
      §3左键打开“教程切换”菜单§r
      §7（Shift+左键：快速切下一本）§r
    - |-
      §e§l重要提示§r
      §c服务器卡顿时，请勿将装备移入各种 GUI！§r
      §7（背包/PC/机器界面等）§r
      §c因此造成的损失服务器概不负责。§r

      §e§l常用功能§r
      §a/recipes§r §f打开合成配方§r

      §3§l召唤精灵§r
      §f按住 §bShift§f + §bF§f（交换副手键）进入召唤模式§r
      §f再用 §b鼠标滚轮§f / §b数字键物品栏§f 选择并召唤队伍精灵§r

      §7随时输入：§a/poke guide§7 重新获取教程书§r
    - |-
      §e§l队伍详情§r

      §a/party§r §f打开队伍详情§r

      §7可查看你的队伍精灵、血量、状态与更多信息。§r

      §7右侧常驻队伍栏也会与当前队伍同步。§r
  stones:
    title: 世界刷新与资源
    author: PtrMC
    pages:
    - |
      §e§l进化石与自然刷新§r

      §f火之石§r：§7地狱生成§r
      §f叶之石§r：§7随机出现在树叶上§r
      §f水之石§r：§7海底§r
      §f雷之石§r：§7高山裸露岩石上§r
      §f月之石§r：§7末地§r
    - |
      §e§l球果与树果§r

      §f球果§r：§7破坏树叶有概率掉落§r
      §c§l剪刀破坏无效§r

      §f树果§r：§7浆果丛成熟时采集§r
      §7种下后固定收获该种树果§r
    - |
      §e§l野外战利品§r
      §7各类道具、技能机等：§r
      §f可在野外宝箱获得，或击败野生精灵掉落。§r

      §e§l钓鱼低概率获得§r
      §f薄荷、特效胶囊、特性膏药、王冠、羽毛、药剂、技能机§r
  breeding:
    title: 孵化与环境偏好
    author: PtrMC
    pages:
    - |
      §e§l繁育基础§r
      §7需要根据性别与蛋组判断能否繁殖。§r
      §7此外，精灵似乎会喜欢某些特定的环境。§r
    - |
      §e§l属性偏好方块（示例）§r
      §f一般§r：§7白色羊毛§r
      §f飞行§r：§7玻璃§r
      §f火§r：§7地狱岩§r
      §f超能力§r：§7末地石§r
      §f水§r：§7黏土§r
      §f虫§r：§7沙子§r
      §f电§r：§7红石块§r
      §f岩石§r：§7原石§r
    - |
      §f草§r：§7草方块 / 干草捆§r
      §f幽灵§r：§7灵魂沙§r
      §f冰§r：§7冰 / 浮冰 / 蓝冰§r
      §f龙§r：§7岩浆块§r
      §f格斗§r：§7骨块§r
      §f恶§r：§7煤炭块§r
      §f毒§r：§7粘液块§r
      §f钢§r：§7铁块 / 铜块§r
      §f地面§r：§7石头§r
      §f妖精§r：§7荧石块§r
    - |
      §e§l孵化方式§r
      §7得到的蛋需要训练师运动起来进行孵化。§r
      §a多跑动，多探索，多冒险！§r
  devices:
    title: 设备研究
    author: PtrMC
    pages:
    - |
      §e§l设备研究§r
      §7在挖掘时似乎会得到一些奇怪的石头……§r
      §7或许可以制造一些机器来研究一下？§r
    - |
      §e§l神奇小精灵§r
      §7在丛林中遇到的神奇小精灵，§r
      §7似乎有变化为所有宝可梦的能力。§r
      §f你是否决定对其进行实验？§r
    - |
      §e§l牧场与能源§r
      §7运营一片宝可梦牧场也许会很有趣。§r
      §7夜晚别忘了提供一些储蓄能源供应。§r
  legends:
    title: 传说之书
    author: PtrMC
    pages:
    - |
      §e§l传说之书§r
      §7在某些极端区域摆放祭坛并注入能量……§r
      §7希望能有缘一睹传说中的身影。§r
    - |
      §e§l基因与秘密§r
      §7丛林深处隐藏的神秘宝可梦，§r
      §7好像拥有全部宝可梦的基因……§r
  community:
