move_desc.decorate: "通过装饰， 大幅提高对方的攻击和特攻。"
move_desc.defendorder: "召唤手下， 让其附在自己的身体上。 可以提高自己的防御和特防。"
move_desc.defensecurl: "将身体蜷曲变圆， 从而提高自己的防御。"
move_desc.defog: "用强风吹开对手的反射壁或光墙等。 也会降低对手的闪避率。"
move_desc.destinybond: "使出招式后， 当受到对手攻击 陷入濒死时， 对手也会一同濒死。 连续使出则会失败。"
move_desc.detect: "完全抵挡对手的攻击。连续使出则容易失败。"
move_desc.devastatingdrake: "通过Ｚ力量将气场实体化， 向对手全力发动袭击。 威力会根据原来的招式而改变。"
move_desc.diamondstorm: "掀起钻石风暴给予伤害。 有时会大幅提高自己的防御。"
move_desc.dig: "第1回合钻入， 第2回合攻击对手。"
move_desc.direclaw: "以破灭之爪瞄准要害进行攻击。 有时还会让对手陷入中毒、麻痹、睡眠之中的一种状态。"
move_desc.disable: "阻碍对手行动， 之前使出的招式 将在4回合内无法使用。"
move_desc.disarmingvoice: "发出魅惑的叫声， 给予对手精神上的伤害。 攻击必定会命中。"
move_desc.discharge: "用耀眼的电击 攻击自己周围所有的宝可梦。 有时会陷入麻痹状态。"
move_desc.dive: "第1回合潜入， 第2回合浮上来进行攻击。"
move_desc.dizzypunch: "有节奏地出拳攻击对手。有时会使对手混乱。"
move_desc.doodle: "把握并映射出对手的本质， 让自己和同伴宝可梦的特性变得和对手相同。"
move_desc.doomdesire: "使用招式２回合后， 会用无数道光束攻击对手。"
move_desc.doubleedge: "拼命地猛撞向对手进行攻击。 自己也会受到不小的伤害。"
move_desc.doublehit: "使用尾巴等 拍打对手进行攻击。 连续2次给予伤害。"
move_desc.doubleironbash: "以胸口的螺帽为中心旋转， 并连续2次挥动手臂打击对手。 有时会使对手畏缩。"
move_desc.doublekick: "用2只脚踢飞对手进行攻击。 连续2次给予伤害。"
move_desc.doubleshock: "将全身所有的电力放出， 给予对手大大的伤害。 自己的电属性将会消失。"
move_desc.doubleslap: "用连环巴掌拍打对手进行攻击。连续攻击２～５次。"
move_desc.doubleteam: "通过快速移动来制造分身， 扰乱对手， 从而提高闪避率。"
move_desc.dracometeor: "从天空中向对手落下陨石。 使用之后因为反作用力， 自己的特攻会大幅降低。"
move_desc.dragonascent: "从天空中急速下降攻击对手。 自己的防御和特防会降低。"
move_desc.dragonbreath: "将强烈的气息 吹向对手进行攻击。 有时会让对手陷入麻痹状态。"
move_desc.dragoncheer: "以龙之鼓舞提高士气， 让我方的招式变得容易击中要害。 对龙属性的鼓舞效果会更强。"
move_desc.dragonclaw: "用尖锐的巨爪 劈开对手进行攻击。"
move_desc.dragondance: "激烈地跳起神秘 且强有力的舞蹈。 从而提高自己的攻击和速度。"
move_desc.dragondarts: "让多龙梅西亚进行2次攻击。 如果对手有2只宝可梦， 则对它们各进行1次攻击。"
move_desc.dragonenergy: "把生命力转换为力量攻击对手。 自己的HP越少， 招式的威力越小。"
move_desc.dragonhammer: "将身体当作锤子， 向对手发动袭击， 给予伤害。"
move_desc.dragonpulse: "从大大的口中掀起冲击波攻击对手。"
move_desc.dragonrage: "将愤怒的冲击波撞向对手进行攻击。必定会给予４０的伤害。"
move_desc.dragonrush: "释放出骇人的杀气， 一边威慑一边撞击对手。 有时会使对手畏缩。"
move_desc.dragontail: "弹飞对手，强制拉后备宝可梦上场。 如果对手为野生宝可梦， 战斗将直接结束。"
move_desc.drainingkiss: "用一个吻吸取对手的HP。 回复给予对手伤害的一半以上的HP。"
move_desc.drainpunch: "用拳头吸取对手的力量。 可以回复给予对手伤害的一半HP。"
move_desc.dreameater: "吃掉正在睡觉的对手的梦进行攻击。 回复对手所受到伤害的一半HP。"
move_desc.drillpeck: "一边旋转，一边将尖喙 刺入对手进行攻击。"
move_desc.drillrun: "像钢钻一样， 一边旋转身体 一边撞击对手。 容易击中要害。"
move_desc.drumbeating: "用鼓点来控制鼓的根部进行攻击， 从而降低对手的速度。"
move_desc.dualchop: "用身体坚硬的部分 拍打对手进行攻击。 连续２次给予伤害。"
move_desc.dualwingbeat: "将翅膀撞向对手进行攻击。 连续2次给予伤害。"
move_desc.dynamaxcannon: "从核心放出光束进行攻击。 如果对手正处于极巨化状态， 则造成的伤害会变为2倍。"
move_desc.dynamicpunch: "使出浑身力气出拳进行攻击。 必定会使对手混乱。"
move_desc.earthpower: "向对手脚下释放出大地之力。 有时会降低对手的特防。"
move_desc.earthquake: "利用地震的冲击， 攻击自己周围所有的宝可梦。"
move_desc.echoedvoice: "用回声攻击对手。 如果每回合都有宝可梦接着 使用该招式， 威力就会提高。"
move_desc.eerieimpulse: "从身体放射出怪异电波， 让对手沐浴其中， 从而大幅降低其特攻。"
move_desc.eeriespell: "用强大的精神力量攻击。 让对手最后使用的招式减少3PP。"
move_desc.eggbomb: "向对手用力投掷大大的蛋进行攻击。"
move_desc.electricterrain: "在5回合内变成电气场地。 地面上的宝可梦将无法入眠。 电属性的招式威力还会提高。"
move_desc.electrify: "对手使出招式前， 如果输电， 则该回合对手的招式变成电属性。"
move_desc.electroball: "用电气团撞向对手。 自己比对手速度越快， 威力越大。"
move_desc.electrodrift: "边变形边高速奔走， 并以未知的电击贯穿对手。 若针对到弱点， 威力会进一步。"
move_desc.electroshot: "第1回合收集电力提高特攻， 第2回合将高压的电力发射出去。 下雨天气时能立刻发射。"
move_desc.electroweb: "用电网捉住对手进行攻击。 降低对手的速度。"
move_desc.embargo: "让对手在５回合内不能使用宝可梦携带的道具。训练家也不能给那只宝可梦使用道具。"
move_desc.ember: "向对手发射 小型火焰进行攻击。 有时会让对手陷入灼伤状态。"
move_desc.encore: "让对手接受再来一次， 连续３次使出最后使用的招式。"
move_desc.endeavor: "给予伤害， 使对手的HP变得和自己的HP一样。"
move_desc.endure: "即使受到攻击， 也至少会留下1ＨＰ。 连续使出则容易失败。"
move_desc.energyball: "发射从自然收集的生命力量。 有时会降低对手的特防。"
move_desc.entrainment: "用神奇的节奏跳舞。 使对手模仿自己的动作， 从而将特性变成一样。"
move_desc.eruption: "爆发怒火攻击对手。 自己的HP越少， 招式的威力越小。"
move_desc.esperwing: "用经过气场强化的翅膀撕裂对手。 容易击中要害。 会提高自己的速度。"
move_desc.eternabeam: "无极汰那变回原来的样子后， 发动的最强攻击。 下一回合自己将无法动弹。"
move_desc.expandingforce: "利用精神力量攻击对手。 在精神场地上威力会有所提高， 能对所有对手造成伤害。"
move_desc.explosion: "引发大爆炸， 攻击自己周围所有的宝可梦。 使用后自己会陷入濒死。"
move_desc.extrasensory: "发出看不见的 神奇力量进行攻击。 有时会使对手畏缩。"
move_desc.extremeevoboost: "得到Ｚ力量的伊布将借助进化后伙伴们的力量，大幅提高能力。"
move_desc.extremespeed: "以迅雷不及掩耳之势 猛撞向对手进行攻击。 必定能够先制攻击。"
move_desc.facade: "当自己处于中毒、麻痹、灼伤状态时， 向对手使出此招式的话， 威力会变成2倍。"
move_desc.fairylock: "通过封锁， 下一回合所有的 宝可梦都无法逃走。"
move_desc.fairywind: "刮起妖精之风， 吹向对手进行攻击。"
move_desc.fakeout: "进行先制攻击， 使对手畏缩。 要在出场后立刻使出才能成功。"
move_desc.faketears: "装哭流泪。 使对手不知所措， 从而大幅降低对手的特防。"
move_desc.falsesurrender: "装作低头认错的样子， 用凌乱的头发进行突刺。 攻击必定会命中。"
move_desc.falseswipe: "对手的ＨＰ 至少会留下１ＨＰ， 如此般手下留情地攻击。"
move_desc.featherdance: "撒出羽毛， 笼罩在对手的周围。 大幅降低对手的攻击。"
move_desc.feint: "能够攻击正在使用 守住或看穿等招式的对手。 解除其守护效果。"
move_desc.feintattack: "悄悄地靠近对手，趁其不备进行殴打。攻击必定会命中。"
move_desc.fellstinger: "如果使用此招式打倒对手， 攻击会巨幅提高。"
move_desc.ficklebeam: "发射光线进行攻击。 有时其他的头也会合力发射镭射， 让招式威力变成2倍。"
move_desc.fierydance: "让火焰覆盖全身， 振翅攻击对手。 有时会提高自己的特攻。"
move_desc.fierywrath: "将愤怒转化为火焰般的气场进行攻击。 有时会使对手畏缩。"
move_desc.filletaway: "削减自己的HP， 大幅提高攻击和特攻以及速度。"
move_desc.finalgambit: "拼命攻击对手。 虽然自己陷入濒死， 但会给予对手 和自己目前ＨＰ等量的伤害。"
move_desc.fireblast: "用大字形状的火焰烧尽对手。 有时会让对手陷入灼伤状态。"
move_desc.firefang: "用覆盖着火焰的牙齿咬住对手。 有时会使对手畏缩 或陷入灼伤状态。"
move_desc.firelash: "用燃烧的鞭子抽打对手。 受到攻击的对手防御会降低。"
move_desc.firepledge: "用火柱进行攻击。 如果和草组合， 威力就会提高， 周围会变成火海。"
move_desc.firepunch: "用充满火焰的拳头攻击对手。 有时会让对手陷入灼伤状态。"
move_desc.firespin: "将对手困在 激烈的火焰旋涡中， 在4～5回合内进行攻击。"
move_desc.firstimpression: "威力很高的招式， 但只有在出场战斗时， 立刻使出才能成功。"
move_desc.fishiousrend: "用坚硬的腮咬住对手。 如果比对手先出手攻击， 招式的威力会变成2倍。"
move_desc.fissure: "让对手掉落于地裂的 裂缝中进行攻击。 只要命中就会一击濒死。"
move_desc.flail: "抓狂般乱打进行攻击。 自己的HP越少， 招式的威力越大。"
move_desc.flameburst: "如果击中，爆裂的火焰会攻击到对手。爆裂出的火焰还会飞溅到旁边的对手。"
move_desc.flamecharge: "让火焰覆盖全身， 攻击对手。 积蓄力量并提高自己的速度。"
move_desc.flamethrower: "向对手发射 烈焰进行攻击。 有时会让对手陷入灼伤状态。"
move_desc.flamewheel: "让火焰覆盖全身， 猛撞向对手进行攻击。 有时会让对手陷入灼伤状态。"
move_desc.flareblitz: "让火焰覆盖全身猛撞向对手。 自己也会受到不小的伤害。 有时会让对手陷入灼伤状态。"
move_desc.flash: "使出耀眼光芒， 从而降低对手的命中率。"
move_desc.flashcannon: "将身体的光芒聚集在一点释放出去。 有时会降低对手的特防。"
move_desc.flatter: "吹捧对手， 使其混乱。 同时还会提高对手的特攻。"
move_desc.fleurcannon: "放出强力光束后， 自己的特攻会大幅降低。"
move_desc.fling: "快速投掷携带的道具进行攻击。 根据道具不同， 威力和效果会改变。"
move_desc.flipturn: "在攻击之后急速返回，和后备宝可梦进行替换。"
move_desc.floatyfall: "轻飘飘地浮起来后，再猛地俯冲下去进行攻击。有时会使对手畏缩。"
move_desc.floralhealing: "回复对手最大HP的一半。 在青草场地时， 效果会提高。"
move_desc.flowershield: "使用神奇的力量 提高在场的所有 草属性宝可梦的防御。"
move_desc.flowertrick: "将做了手脚的花束扔向对手进行攻击。 必定会命中， 且会击中要害。"
move_desc.fly: "第1回合飞上天空， 第2回合攻击对手。"
move_desc.flyingpress: "从空中俯冲向对手。 此招式同时带有 格斗属性和飞行属性。"
move_desc.focusblast: "提高气势， 释放出全部力量。 有时会降低对手的特防。"
move_desc.focusenergy: "深深地吸口气， 集中精神。 自己的攻击 会变得容易击中要害。"
move_desc.focuspunch: "集中精神出拳。 在招式使出前 若受到攻击则会失败。"
move_desc.followme: "引起对手的注意， 将对手的攻击 全部转移到自己身上。"
move_desc.forcepalm: "向对手的身体 发出冲击波进行攻击。 有时会让对手陷入麻痹状态。"
move_desc.foresight: "对幽灵属性宝可梦没有效果的招式以及闪避率高的对手，使用后变得能够打中。"
move_desc.forestscurse: "向对手施加森林诅咒。 中了诅咒的对手 会被追加草属性。"
move_desc.foulplay: "利用对手的力量进行攻击。 正和自己战斗的对手， 其攻击越高， 伤害越大。"
move_desc.freezedry: "急剧冷冻对手， 有时会让对手陷入冰冻状态。 对于水属性宝可梦也是效果绝佳。"
move_desc.freezeshock: "用覆盖着电流的冰块， 在第2回合撞向对手。 有时会让对手陷入麻痹状态。"
move_desc.freezingglare: "从双眼发射精神力量进行攻击。 有时会让对手陷入冰冻状态。"
move_desc.freezyfrost: "利用冰冷的黑雾结晶进行攻击。使全体宝可梦的能力变回原点。"
move_desc.frenzyplant: "用大树摔打对手进行攻击。 下一回合自己将无法动弹。"
move_desc.frostbreath: "将冰冷的气息 吹向对手进行攻击。 必定会击中要害。"
move_desc.frustration: "为了发泄不满而全力攻击对手。亲密度越低，威力越大。"
move_desc.furyattack: "用角或喙 刺向对手进行攻击。 连续攻击2～5次。"
move_desc.furycutter: "用镰刀或爪子等 切斩对手进行攻击。 连续击中， 威力就会提高。"
move_desc.furyswipes: "用爪子或镰刀等 抓对手进行攻击。 连续攻击2～5次。"
move_desc.fusionbolt: "释放出巨大的闪电。 受到巨大的火焰影响时， 招式威力会提高。"
move_desc.fusionflare: "释放出巨大的火焰。 受到巨大的闪电影响时， 招式威力会提高。"
move_desc.futuresight: "在使用招式２回合后， 向对手发送一团念力进行攻击。"
move_desc.gastroacid: "将胃液吐向对手的身体。 沾上的胃液会消除对手的特性效果。"
move_desc.geargrind: "向对手投掷 钢铁齿轮进行攻击。 连续2次给予伤害。"
move_desc.gearup: "启动齿轮， 提高特性为正电和负电的 宝可梦的攻击和特攻。"
move_desc.genesissupernova: "得到Ｚ力量的梦幻将全力攻击对手。脚下会变成精神场地。"
move_desc.geomancy: "第1回合吸收能量， 第2回合大幅提高 特攻、特防和速度。"
move_desc.gigadrain: "吸取对手的养分进行攻击。 可以回复给予对手伤害的一半HP。"
move_desc.gigaimpact: "使出自己浑身力量突击对手。 下一回合自己将无法动弹。"
move_desc.gigatonhammer: "连同身体转起巨大的锤子进行攻击。 这个招式无法连续使出2次。"
move_desc.gigavolthavoc: "通过Ｚ力量将蓄积的强大电流全力撞向对手。 威力会根据原来的招式而改变。"
move_desc.glaciallance: "向对手投掷 掀起暴风雪的冰矛进行攻击。"
move_desc.glaciate: "将冰冻的冷气 吹向对手进行攻击。 会降低对手的速度。"
move_desc.glaiverush: "有勇无谋的舍身突击。 使出招式后， 对手的攻击必定会命中， 且伤害会变成2倍。"
move_desc.glare: "用腹部的花纹使对手害怕， 从而让其陷入麻痹状态。"
move_desc.glitzyglow: "利用念力强攻， 粉碎对方信心。 制造一道能减弱对手特殊攻击的神奇墙壁。"
move_desc.gmaxbefuddle: "超极巨化的巴大蝶使出的虫属性攻击。 会让对手陷入中毒、麻痹或睡眠状态。"
move_desc.gmaxcannonade: "超极巨化的水箭龟使出的水属性攻击。 可在4回合内给予对手伤害。"
move_desc.gmaxcentiferno: "超极巨化的焚焰蚣使出的火属性攻击。 可在4～5回合内将对手困在火焰中。"
move_desc.gmaxchistrike: "超极巨化的怪力使出的格斗属性攻击。 会变得容易击中要害。"
move_desc.gmaxcuddle: "超极巨化的伊布使出的一般属性攻击。 会让对手陷入着迷状态。"
move_desc.gmaxdepletion: "超极巨化的铝钢龙使出的龙属性攻击。 可减少对手最后使用的招式的PP。"
move_desc.gmaxdrumsolo: "超极巨化的轰擂金刚猩使出的草属性攻击。 不会受到对手特性的干扰。"
move_desc.gmaxfinale: "超极巨化的霜奶仙使出的妖精属性攻击。 可回复我方的HP。"
move_desc.gmaxfireball: "超极巨化的闪焰王牌使出的火属性攻击。 不会受到对手特性的干扰。"
move_desc.gmaxfoamburst: "超极巨化的巨钳蟹使出的水属性攻击。 会大幅降低对手的速度。"
move_desc.gmaxgoldrush: "超极巨化的喵喵使出的一般属性攻击。 会让对手陷入混乱状态， 并可获得金钱。"
move_desc.gmaxgravitas: "超极巨化的以欧路普使出的超能力属性攻击。 在5回合内重力会产生变化。"
move_desc.gmaxhydrosnipe: "超极巨化的千面避役使出的水属性攻击。 不会受到对手特性的干扰。"
move_desc.gmaxmalodor: "超极巨化的灰尘山使出的毒属性攻击。 会让对手陷入中毒状态。"
move_desc.gmaxmeltdown: "超极巨化的美录梅塔使出的钢属性攻击。 会让对手无法连续使出相同的招式。"
move_desc.gmaxoneblow: "超极巨化的武道熊师使出的恶属性攻击。 是可以无视极巨防壁的一击。"
move_desc.gmaxrapidflow: "超极巨化的武道熊师使出的水属性攻击。 是可以无视极巨防壁的连击。"
move_desc.gmaxreplenish: "超极巨化的卡比兽使出的一般属性攻击。 会让吃掉的树果再生。"
move_desc.gmaxresonance: "超极巨化的拉普拉斯使出的冰属性攻击。 可在5回合内减弱受到的伤害。"
move_desc.gmaxsandblast: "超极巨化的沙螺蟒使出的地面属性攻击。 在4～5回合内会狂刮沙暴。"
move_desc.gmaxsmite: "超极巨化的布莉姆温使出的妖精属性攻击。 会让对手陷入混乱状态。"
move_desc.gmaxsnooze: "超极巨化的长毛巨魔使出的恶属性攻击。 会通过打大哈欠让对手产生睡意。"
move_desc.gmaxsteelsurge: "超极巨化的大王铜象使出的钢属性攻击。 会发射无数锐利的刺。"
move_desc.gmaxstonesurge: "超极巨化的暴噬龟使出的水属性攻击。 会发射无数锐利的岩石。"
move_desc.gmaxstunshock: "超极巨化的颤弦蝾螈使出的电属性攻击。 会让对手陷入中毒或麻痹状态。"
move_desc.gmaxsweetness: "超极巨化的丰蜜龙使出的草属性攻击。 会治愈我方的异常状态。"
move_desc.gmaxtartness: "超极巨化的苹裹龙使出的草属性攻击。 会降低对手的闪避率。"
move_desc.gmaxterror: "超极巨化的耿鬼使出的幽灵属性攻击。 会踩住对手的影子， 让其无法被替换。"
move_desc.gmaxvinelash: "超极巨化的妙蛙花使出的草属性攻击。 可在4回合内给予对手伤害。"
move_desc.gmaxvolcalith: "超极巨化的巨炭山使出的岩石属性攻击。 可在4回合内给予对手伤害。"
move_desc.gmaxvoltcrash: "超极巨化的皮卡丘使出的电属性攻击。 会让对手陷入麻痹状态。"
move_desc.gmaxwildfire: "超极巨化的喷火龙使出的火属性攻击。 可在4回合内给予对手伤害。"
move_desc.gmaxwindrage: "超极巨化的钢铠鸦使出的飞行属性攻击。 可消除反射壁和光墙。"
move_desc.grassknot: "用草缠住并绊倒对手。 对手越重， 威力越大。"
move_desc.grasspledge: "用草柱进行攻击。 如果和水组合， 威力就会提高， 周围会变成湿地。"
move_desc.grasswhistle: "让对手听舒适的笛声，从而陷入睡眠状态。"
move_desc.grassyglide: "仿佛在地面上滑行般地攻击对手。 在青草场地上， 必定能够先制攻击。"
move_desc.grassyterrain: "在5回合内变成青草场地。 地面上的宝可梦每回合都能回复。 草属性的招式威力还会提高。"
move_desc.gravapple: "从高处落下苹果， 给予对手伤害。 可降低对手的防御。"
move_desc.gravity: "在5回合内， 飘浮特性和飞行属性的宝可梦会被地面属性的招式击中。 飞向空中的招式也将无法使用。"
move_desc.growl: "让对手听可爱的叫声， 引开注意力使其疏忽， 从而降低对手的攻击。"
move_desc.growth: "让身体一下子长大， 从而提高攻击和特攻。"
move_desc.grudge: "因对手的招式而陷入濒死时给对手施加怨念， 让该招式的PP变成0。"
move_desc.guardianofalola: "通过Z力量得到阿罗拉之力的土地神宝可梦将全力进行攻击。 对手的剩余HP会减少很多。"
move_desc.guardsplit: "利用超能力将自己和对手的 防御和特防相加， 再进行平分。"
move_desc.guardswap: "利用超能力互换 自己和对手的防御 以及特防的能力变化。"
move_desc.guillotine: "用大钳子或剪刀等 夹断对手进行攻击。 只要命中就会一击濒死。"
move_desc.gunkshot: "用肮脏的垃圾 撞向对手进行攻击。 有时会让对手陷入中毒状态。"
move_desc.gust: "用翅膀将刮起的狂风 袭向对手进行攻击。"
move_desc.gyroball: "让身体高速旋转并撞击对手。 速度比对手越慢， 威力越大。"
move_desc.hail: "在５回合内一直降冰雹， 除冰属性的宝可梦以外， 给予全体宝可梦伤害。"
move_desc.hammerarm: "挥舞强力而沉重的拳头， 给予对手伤害。 自己的速度会降低。"
move_desc.happyhour: "如果使用欢乐时光， 战斗后得到的钱会翻倍。"
move_desc.harden: "全身使劲， 让身体变硬， 从而提高自己的防御。"
move_desc.hardpress: "用手臂或钳子压迫对手。 对手剩余的ＨＰ越多， 威力越大。"
move_desc.haze: "升起黑雾，将正在场上战斗的 全体宝可梦的能力变回原点。"
move_desc.headbutt: "将头伸出， 笔直地扑向对手进行攻击。 有时会使对手畏缩。"
move_desc.headcharge: "用厉害的爆炸头 猛撞向对手进行攻击。 自己也会受到少许伤害。"
move_desc.headlongrush: "向对手使出灌注了全心全力的撞击。 自己的防御和特防会降低。"
move_desc.headsmash: "拼命使出浑身力气， 向对手进行头锤攻击。 自己也会受到非常大的伤害。"
move_desc.healbell: "让同伴听舒适的铃音， 从而治愈我方全员的异常状态。"
move_desc.healblock: "在５回合内无法通过招式、特性或携带的道具来回复ＨＰ。"
move_desc.healingwish: "虽然自己陷入濒死， 但可以治愈后备上场的 宝可梦的异常状态以及回复ＨＰ。"
move_desc.healorder: "召唤手下疗伤。回复自己最大ＨＰ的一半。"
move_desc.healpulse: "放出治愈波动， 从而回复对手最大HP的一半。"
move_desc.heartstamp: "以可爱的动作使对手疏忽，乘机给出强烈的一击。有时会使对手畏缩。"
move_desc.heartswap: "利用超能力互换自己和对手之间的能力变化。"
move_desc.heatcrash: "用燃烧的身体撞向对手进行攻击。 自己比对手越重， 威力越大。"
move_desc.heatwave: "将炎热的气息 吹向对手进行攻击。 有时会让对手陷入灼伤状态。"
move_desc.heavyslam: "用沉重的身体撞向对手进行攻击。 自己比对手越重， 威力越大。"
move_desc.helpinghand: "帮助伙伴。 被帮助的宝可梦， 其招式威力变得比平时大。"
move_desc.hex: "接二连三地进行攻击。 对处于异常状态的对手 给予较大的伤害。"
move_desc.hiddenpower: "招式的属性会随着使用此招式的宝可梦而改变。"
move_desc.highhorsepower: "使出全身力量， 猛攻对手。"
move_desc.highjumpkick: "跳起后用膝盖撞对手进行攻击。 如果撞偏则自己会受到伤害。"
move_desc.holdback: "在攻击的时候手下留情， 从而使对手的ＨＰ 至少会留下１ＨＰ。"
move_desc.holdhands: "我方宝可梦之间牵手。 能带来非常幸福的心情。"
move_desc.honeclaws: "将爪子磨得更加锋利。 提高自己的攻击和命中率。"
move_desc.hornattack: "用尖锐的角攻击对手。"
move_desc.horndrill: "用旋转的角 刺入对手进行攻击。 只要命中就会一击濒死。"
move_desc.hornleech: "将角刺入， 吸取对手的养分。 可以回复给予对手伤害的一半HP。"
move_desc.howl: "大声吼叫提高气势， 从而提高自己和同伴的攻击。"
move_desc.hurricane: "用强烈的风席卷 对手进行攻击。 有时会使对手混乱。"
move_desc.hydrocannon: "向对手喷射水炮进行攻击。 下一回合自己将无法动弹。"
move_desc.hydropump: "向对手猛烈地喷射 大量水流进行攻击。"
move_desc.hydrosteam: "将煮得翻滚的开水猛烈地喷向对手。 日照强烈时， 招式威力不但不会降低， 还会变成1.5倍。"
move_desc.hydrovortex: "通过Ｚ力量制造大大的潮旋， 全力吞没对手。 威力会根据原来的招式而改变。"
move_desc.hyperbeam: "向对手发射强烈的光线进行攻击。 下一回合自己将无法动弹。"
move_desc.hyperdrill: "急速旋转尖锐的身体部位贯穿对手。 可以无视守住和看穿等招式。"
move_desc.hyperfang: "用锋利的门牙 牢牢地咬住对手进行攻击。 有时会使对手畏缩。"
move_desc.hyperspacefury: "用许多手臂， 无视对手的守住或看穿等招式进行连续攻击， 自己的防御会降低。"
move_desc.hyperspacehole: "通过异次元洞， 突然出现在对手的侧面进行攻击。 还可以无视守住和看穿等招式。"
move_desc.hypervoice: "给予对手又吵又响的 巨大震动进行攻击。"
move_desc.hypnosis: "施以诱导睡意的暗示， 让对手陷入睡眠状态。"
move_desc.iceball: "在5回合内攻击对手。 招式每次击中， 威力就会提高。"
move_desc.icebeam: "向对手发射 冰冻光束进行攻击。 有时会让对手陷入冰冻状态。"
move_desc.iceburn: "用能够冻结一切的强烈冷气， 在第2回合包裹住对手。 有时会让对手陷入灼伤状态。"
move_desc.icefang: "用藏有冷气的牙齿咬住对手。 有时会使对手畏缩 或陷入冰冻状态。"
move_desc.icehammer: "挥舞强力而沉重的拳头， 给予对手伤害。 自己的速度会降低。"
move_desc.icepunch: "用充满寒气的拳头攻击对手。 有时会让对手陷入冰冻状态。"
move_desc.iceshard: "瞬间制作冰块， 快速地扔向对手。 必定能够先制攻击。"
move_desc.icespinner: "脚上覆盖薄冰， 旋转着撞击对手。 通过旋转的动作破坏场地。"
move_desc.iciclecrash: "用大冰柱激烈地 撞向对手进行攻击。 有时会使对手畏缩。"
move_desc.iciclespear: "向对手发射 锋利的冰柱进行攻击。 连续攻击2～5次。"
move_desc.icywind: "将结冰的冷气吹向对手进行攻击。 会降低对手的速度。"
move_desc.imprison: "如果对手有和自己相同的招式， 那么只有对手无法使用该招式。"
move_desc.incinerate: "用火焰攻击对手。 对手携带树果等时， 会烧掉，使其不能使用。"
move_desc.infernalparade: "用无数的火球进行攻击。 有时会让对手陷入灼伤状态。 攻击处于异常状态的对手时， 威力会变成2倍。"
move_desc.inferno: "用烈焰包裹住对手进行攻击。 让对手陷入灼伤状态。"
move_desc.infernooverdrive: "通过Ｚ力量喷出熊熊烈火， 全力撞向对手。 威力会根据原来的招式而改变。"
move_desc.infestation: "在4～5回合内死缠烂打地进行攻击。 在此期间对手将无法逃走。"
move_desc.ingrain: "在大地上扎根， 每回合回复自己的HP。 因为扎根了， 所以不能替换宝可梦。"
move_desc.instruct: "向对手下达指示， 让其再次使出刚才的招式。"
move_desc.iondeluge: "将带电粒子扩散开来，使一般属性的招式变成电属性。"
move_desc.irondefense: "将皮肤变得坚硬如铁， 从而大幅提高自己的防御。"
move_desc.ironhead: "用钢铁般 坚硬的头部进行攻击。 有时会使对手畏缩。"
move_desc.irontail: "使用坚硬的尾巴摔打对手进行攻击。 有时会降低对手的防御。"
move_desc.ivycudgel: "用缠有藤蔓的棍棒殴打。 属性会随所戴的面具而改变。 容易击中要害。"
move_desc.jawlock: "使双方直到一方濒死为止 无法替换宝可梦。 其中一方退场则可以解除效果。"
move_desc.jetpunch: "将激流覆盖于拳头， 以肉眼无法辨识的速度打出拳击。 必定能够先制攻击。"
move_desc.judgment: "向对手放出无数的光弹。 属性会根据自己携带的石板不同而改变。"
move_desc.jumpkick: "使出高高的腾空踢攻击对手。如果踢偏则自己会受到伤害。"
move_desc.junglehealing: "与丛林融为一体， 回复自己和场上同伴的ＨＰ和状态。"
move_desc.karatechop: "用锋利的手刀劈向对手进行攻击。容易击中要害。"
move_desc.kinesis: "折弯汤匙引开注意， 从而降低对手的命中率。"
move_desc.kingsshield: "防住对手攻击的同时， 自己变为防御姿态。 能够降低所接触到的对手的攻击。"
move_desc.knockoff: "拍落对手的持有物， 直到战斗结束都不能使用。 对手携带道具时会增加伤害。"
move_desc.kowtowcleave: "下跪让对手大意后发起袭击劈向对手。 攻击必定会命中。"
move_desc.landswrath: "聚集大地的力量， 将此力量集中攻击对手， 并给予伤害。"
move_desc.laserfocus: "集中精神， 下次攻击必定会击中要害。"
move_desc.lashout: "攻击对手以发泄对其感到的恼怒情绪。 如果在该回合内自身能力遭到降低， 招式的威力会变成2倍。"
move_desc.lastresort: "当战斗中已学会的招式 全部使用过后， 才能开始使出珍藏的招式。"
move_desc.lastrespects: "为了化解伙伴的悔恨而进行攻击。 被打倒的我方宝可梦越多， 招式的威力越高。"
move_desc.lavaplume: "用熊熊烈火攻击自己周围所有的宝可梦。有时会陷入灼伤状态。"
move_desc.leafage: "将叶片打向对手， 进行攻击。"
move_desc.leafblade: "像用剑一般操纵叶片 切斩对手进行攻击。 容易击中要害。"
move_desc.leafstorm: "用尖尖的叶片向对手卷起风暴。 使用之后因为反作用力自己的特攻会大幅降低。"
move_desc.leaftornado: "用锋利的叶片包裹住对手进行攻击。 有时会降低对手的命中率。"
move_desc.leechlife: "吸取血液攻击对手。 可以回复给予对手伤害的一半HP。"
move_desc.leechseed: "植入寄生种子后，将在每回合 一点一点吸取对手的ＨＰ， 从而用来回复自己的ＨＰ。"
move_desc.leer: "用犀利的眼神使其害怕， 从而降低对手的防御。"
move_desc.letssnuggleforever: "得到Ｚ力量的谜拟丘将全力进行乱揍攻击。"
move_desc.lick: "用长长的舌头， 舔遍对手进行攻击。 有时会让对手陷入麻痹状态。"
move_desc.lifedew: "喷洒出神奇的水， 回复自己和场上同伴的ＨＰ。"
move_desc.lightofruin: "借用永恒之花的力量， 发射出强力光线。 自己也会受到不小的伤害。"
move_desc.lightscreen: "利用神奇的墙壁， 在5回合内减弱从对手那里 受到的特殊攻击的伤害。"
move_desc.lightthatburnsthesky: "奈克洛兹玛会无视对手的特性效果， 在攻击和特攻之间， 用数值相对较高的一项给予对方伤害。"
move_desc.liquidation: "用水之力量撞向对手进行攻击。 有时会降低对手的防御。"
move_desc.lockon: "紧紧瞄准对手， 下次攻击必定会打中。"
move_desc.lovelykiss: "用恐怖的脸强吻对手。 让对手陷入睡眠状态。"
move_desc.lowkick: "用力踢对手的脚， 使其摔倒进行攻击。 对手越重， 威力越大。"
move_desc.lowsweep: "以敏捷的动作瞄准对手的脚进行攻击。 降低对手的速度。"
move_desc.luckychant: "向天许愿，从而在５回合内不会被对手的攻击打中要害。"
move_desc.luminacrash: "放出连精神都能影响到的奇妙怪光进行攻击。 会大幅降低对方的特防。"
move_desc.lunarblessing: "向新月献上祈祷， 回复自己和场上同伴的HP和状态。"
move_desc.lunardance: "虽然自己陷入濒死， 但可以治愈后备上场的 宝可梦的全部状态。"
move_desc.lunge: "全力猛扑对手进行攻击。 从而降低对手的攻击。"
move_desc.lusterpurge: "释放耀眼的光芒进行攻击。 有时会降低对手的特防。"
move_desc.machpunch: "以迅雷不及掩耳之势出拳。 必定能够先制攻击。"
move_desc.magicalleaf: "散落可以追踪 对手的神奇叶片。 攻击必定会命中。"
move_desc.magicaltorque: "TODO"
move_desc.magiccoat: "当对手使出会变成异常状态的 招式或寄生种子等时， 会将对手的招式反射回去。"
move_desc.magicpowder: "向对手喷洒魔法粉， 使对手变为超能力属性。"
move_desc.magicroom: "制造出离奇的空间。 在5回合内所有宝可梦携带道具的效果都会消失。"
move_desc.magmastorm: "将对手困在 熊熊燃烧的火焰中， 在4～5回合内进行攻击。"
move_desc.magnetbomb: "发射吸住对手的钢铁炸弹。攻击必定会命中。"
move_desc.magneticflux: "通过操控磁场， 会提高特性为正电和负电的 宝可梦的防御和特防。"
move_desc.magnetrise: "利用电气产生的磁力浮在空中。 在５回合内可以飘浮。"
move_desc.magnitude: "晃动地面，攻击自己周围所有的宝可梦。招式的威力会有各种变化。"
move_desc.makeitrain: "扔出大量硬币攻击。 自己的特攻会降低， 战斗后还可以拿到钱。"
move_desc.maliciousmoonsault: "通过Ｚ力量得到强壮肉体的炽焰咆哮虎将全力撞向对手进行攻击。"
move_desc.malignantchain: "用由毒形成的锁链缠住对手注入毒素加以侵蚀。 有时会让对手陷入剧毒状态。"
move_desc.matblock: "将掀起来的榻榻米当作盾牌， 防住自己和同伴免受招式伤害。 变化招式无法防住。"
move_desc.matchagotcha: "发射经搅拌的茶的大炮， 可以回复给予对手伤害的一半ＨＰ， 有时会让对手陷入灼伤状态。"
move_desc.maxairstream: "极巨化宝可梦使出的飞行属性攻击。 会提高我方的速度。"
move_desc.maxdarkness: "极巨化宝可梦使出的恶属性攻击。 会降低对手的特防。"
move_desc.maxflare: "极巨化宝可梦使出的火属性攻击。 可在５回合内让日照变得强烈。"
move_desc.maxflutterby: "极巨化宝可梦使出的虫属性攻击。 会降低对手的特攻。"
move_desc.maxgeyser: "极巨化宝可梦使出的水属性攻击。 可在５回合内降下大雨。"
move_desc.maxguard: "完全抵挡对手的攻击。连续使出则容易失败。"
move_desc.maxhailstorm: "极巨化宝可梦 才能使出的冰属性攻击。 在5回合内会降下冰雹。"
move_desc.maxknuckle: "极巨化宝可梦使出的格斗属性攻击。 会提高我方的攻击。"
move_desc.maxlightning: "极巨化宝可梦使出的电属性攻击。 可在５回合内将脚下变成电气场地。"
move_desc.maxmindstorm: "极巨化宝可梦使出的超能力属性攻击。 可在５回合内将脚下变成精神场地。"
move_desc.maxooze: "极巨化宝可梦使出的毒属性攻击。 会提高我方的特攻。"
move_desc.maxovergrowth: "极巨化宝可梦使出的草属性攻击。 可在５回合内将脚下变成青草场地。"
move_desc.maxphantasm: "极巨化宝可梦使出的幽灵属性攻击。 会降低对手的防御。"
move_desc.maxquake: "极巨化宝可梦使出的地面属性攻击。 会提高我方的特防。"
move_desc.maxrockfall: "极巨化宝可梦使出的岩石属性攻击。 可在５回合内卷起沙暴。"
move_desc.maxstarfall: "极巨化宝可梦使出的妖精属性攻击。 可在５回合内将脚下变成薄雾场地。"
move_desc.maxsteelspike: "极巨化宝可梦使出的钢属性攻击。 会提高我方的防御。"
move_desc.maxstrike: "极巨化宝可梦使出的一般属性攻击。 会降低对手的速度。"
move_desc.maxwyrmwind: "极巨化宝可梦使出的龙属性攻击。 会降低对手的攻击。"
move_desc.meanlook: "用好似要勾人心魂的黑色目光 一动不动地凝视对手， 使其不能从战斗中逃走。"
move_desc.meditate: "唤醒身体深处沉睡的力量，从而提高自己的攻击。"
move_desc.mefirst: "提高威力， 抢先使出对手想要使出的招式。 如果不先使出则会失败。"
move_desc.megadrain: "吸取对手的养分进行攻击。 可以回复给予对手伤害的一半HP。"
move_desc.megahorn: "用坚硬且华丽的角狠狠地 刺入对手进行攻击。"
move_desc.megakick: "使出力大无穷的重踢 踢飞对手进行攻击。"
move_desc.megapunch: "用充满力量的拳头攻击对手。"
move_desc.memento: "虽然会使自己陷入濒死， 但是能够大幅降低对手的攻击和特攻。"
move_desc.menacingmoonrazemaelstrom: "得到Ｚ力量的露奈雅拉将全力进行攻击。 可以无视对手的特性效果。"
move_desc.metalburst: "使出招式前， 将最后受到的招式的伤害 大力返还给对手。"
move_desc.metalclaw: "用钢铁之爪劈开对手进行攻击。 有时会提高自己的攻击。"
move_desc.metalsound: "让对手听摩擦金属般讨厌的声音。 大幅降低对手的特防。"
move_desc.meteorassault: "大力挥舞粗壮的茎进行攻击。 但同时自己也会被晃晕， 下一回合自己将无法动弹。"
move_desc.meteorbeam: "第1回合聚集宇宙之力提高特攻， 第2回合攻击对手。"
move_desc.meteormash: "使出彗星般的拳头攻击对手。 有时会提高自己的攻击。"
move_desc.metronome: "挥动手指刺激自己的大脑， 从所有的招式中 任意使出１个。"
move_desc.mightycleave: "用积蓄在头部的光来斩切对手。 可以无视守护进行攻击。"
move_desc.milkdrink: "回复自己最大ＨＰ的一半。"
move_desc.mimic: "可以将对手最后使用的招式， 在战斗内变成自己的招式。"
move_desc.mindblown: "让自己的头爆炸， 来攻击周围的一切。 自己也会受到伤害。"
move_desc.mindreader: "用心感受对手的行动， 下次攻击必定会击中对手。"
move_desc.minimize: "蜷缩身体显得很小， 从而大幅提高 自己的闪避率。"
move_desc.miracleeye: "对恶属性宝可梦没有效果的招式以及闪避率高的对手，使用后变得能够打中。"
move_desc.mirrorcoat: "从对手那里受到 特殊攻击的伤害将以 2倍返还给同一个对手。"
move_desc.mirrormove: "模仿对手使用的招式， 自己也使用相同招式。"
move_desc.mirrorshot: "抛光自己的身体， 向对手释放出闪光之力。 有时会降低对手的命中率。"
move_desc.mist: "用白雾覆盖身体。 在５回合内不会让对手 降低自己的能力。"
move_desc.mistball: "用围绕着雾状羽毛的球进行攻击。 有时会降低对手的特攻。"
move_desc.mistyexplosion: "对自己周围的所有宝可梦进行攻击， 但使出后， 自己会陷入濒死。 在薄雾场地上， 招式威力会提高。"
move_desc.mistyterrain: "在５回合内， 地面上的宝可梦不会陷入异常状态。 龙属性招式的伤害也会减半。"
move_desc.moonblast: "借用月亮的力量攻击对手。 有时会降低对手的特攻。"
move_desc.moongeistbeam: "放出奇怪的光线攻击对手。 可以无视对手的特性进行攻击。"
move_desc.moonlight: "回复自己的ＨＰ。根据天气的不同，回复量也会有所变化。"
move_desc.morningsun: "回复自己的ＨＰ。根据天气的不同，回复量也会有所变化。"
move_desc.mortalspin: "通过旋转来攻击对手。 可以摆脱绑紧、紧束、寄生种子等招式。 还能让对手陷入中毒状态。"
move_desc.mountaingale: "将冰山般巨大的冰块砸向对手进行攻击。 有时会使对手畏缩。"
move_desc.mudbomb: "向对手发射坚硬的泥弹进行攻击。 有时会降低对手的命中率。"
move_desc.muddywater: "向对手喷射 浑浊的水进行攻击。 有时会降低对手的命中率。"
move_desc.mudshot: "向对手投掷泥块进行攻击。 同时降低对手的速度。"
move_desc.mudslap: "向对手的脸等投掷泥块进行攻击。 会降低对手的命中率。"
move_desc.mudsport: "一旦使用此招式，周围就会弄得到处是泥。在５回合内减弱电属性的招式。"
move_desc.multiattack: "一边覆盖高能量， 一边撞向对手进行攻击。 根据存储碟不同， 属性会改变。"
move_desc.mysticalfire: "从口中喷出特别灼热的火焰进行攻击。 降低对手的特攻。"
move_desc.mysticalpower: "放出不可思议的力量攻击。 会提高自己的特攻。"
move_desc.nastyplot: "谋划诡计， 激活头脑。 大幅提高自己的特攻。"
move_desc.naturalgift: "从树果上获得力量进行攻击。 根据携带的树果， 招式属性和威力会改变。"
move_desc.naturepower: "用自然之力进行攻击。 根据所使用场所的不同， 使出的招式也会有所变化。"
move_desc.naturesmadness: "向对手释放自然之怒。 对手的HP会减半。"
move_desc.needlearm: "用带刺的手臂猛烈地挥舞进行攻击。有时会使对手畏缩。"
move_desc.neverendingnightmare: "通过Ｚ力量召唤强烈的怨念， 全力降临到对手身上。 威力会根据原来的招式而改变。"
move_desc.nightdaze: "放出黑暗的冲击波攻击对手。 有时会降低对手的命中率。"
move_desc.nightmare: "让在睡眠状态下的对手做恶梦，每回合会缓缓减少ＨＰ。"
move_desc.nightshade: "显示恐怖幻影， 只给予对手和自己等级相同的伤害。"
move_desc.nightslash: "抓住瞬间的空隙 切斩对手。 容易击中要害。"
move_desc.nobleroar: "发出战吼威吓对手， 从而降低对手的攻击和特攻。"
move_desc.noretreat: "提高自己的所有能力， 但无法替换或逃走。"
move_desc.noxioustorque: "TODO"
move_desc.nuzzle: "将带电的脸颊 蹭蹭对手进行攻击。 让对手陷入麻痹状态。"
move_desc.oblivionwing: "从锁定的对手身上吸取HP。 回复给予对手伤害的一半以上的HP。"
move_desc.obstruct: "完全抵挡对手的攻击。 连续使出则容易失败。 一旦触碰， 防御就会大幅降低。"
move_desc.oceanicoperetta: "通过Ｚ力量召唤大量水的西狮海壬将全力攻击对手。"
move_desc.octazooka: "向对手的脸等喷出墨汁进行攻击。 有时会降低对手的命中率。"
move_desc.octolock: "让对手无法逃走。 对手被固定后， 每回合都会降低防御和特防。"
move_desc.odorsleuth: "对幽灵属性宝可梦没有效果的招式以及闪避率高的对手，使用后变得能够打中。"
move_desc.ominouswind: "突然刮起毛骨悚然的暴风攻击对手。 有时会提高自己的全部能力。"
move_desc.orderup: "以潇洒的身手进行攻击。 若口中有米立龙， 会按其样子提高能力。"
move_desc.originpulse: "用无数青白色 且闪耀的光线攻击对手。"
move_desc.outrage: "在２～３回合内，乱打一气地进行攻击。大闹一番后自己会陷入混乱。"
move_desc.overdrive: "奏响吉他和贝斯，释放出 发出巨响的剧烈震动 攻击对手。"
move_desc.overheat: "使出全部力量攻击对手。 使用之后会因为反作用力， 自己的特攻大幅降低。"
move_desc.painsplit: "将自己的HP和对手的HP相加， 然后自己和对手友好地平分。"
move_desc.paraboliccharge: "给周围全体宝可梦造成伤害。 可以回复给予伤害的一半HP。"
move_desc.partingshot: "抛下狠话威吓对手， 降低攻击和特攻后， 和后备宝可梦进行替换。"
move_desc.payback: "蓄力攻击。 如果能在对手之后攻击， 招式的威力会变成2倍。"
move_desc.payday: "向对手的身体 投掷小金币进行攻击。 战斗后可以拿到钱。"
move_desc.peck: "用尖锐的喙或角 刺向对手进行攻击。"
move_desc.perishsong: "倾听歌声的宝可梦 经过３回合陷入濒死。 替换后效果消失。"
move_desc.petalblizzard: "猛烈地刮起飞雪般的落花， 攻击周围所有的宝可梦， 并给予伤害。"
move_desc.petaldance: "在２～３回合内， 散落花瓣攻击对手。 之后自己会陷入混乱。"
move_desc.phantomforce: "第１回合消失在某处， 第２回合攻击对手。 可以无视守护进行攻击。"
move_desc.photongeyser: "用光柱来进行攻击。 比较自己的攻击和特攻， 用数值相对较高的一项给予对方伤害。"
move_desc.pikapapow: "皮卡丘越喜欢训练家， 电击的威力就越强。 攻击必定会命中。"
move_desc.pinmissile: "向对手发射 锐针进行攻击。 连续攻击2～5次。"
move_desc.plasmafists: "用覆盖着电流的拳头进行攻击。 使一般属性的招式变成电属性。"
move_desc.playnice: "和对手和睦相处， 使其失去战斗的气力， 从而降低对手的攻击。"
move_desc.playrough: "与对手嬉闹并攻击。 有时会降低对手的攻击。"
move_desc.pluck: "用喙进行攻击。 当对手携带树果时， 可以食用并获得其效果。"
move_desc.poisonfang: "用有毒的牙齿 咬住对手进行攻击。 有时会使对手中剧毒。"
move_desc.poisongas: "将毒瓦斯吹到对手的脸上， 从而让对手陷入中毒状态。"
move_desc.poisonjab: "用带毒的触手或手臂刺入对手。 有时会让对手陷入中毒状态。"
move_desc.poisonpowder: "撒出毒粉， 从而让对手陷入中毒状态。"
move_desc.poisonsting: "将有毒的针 刺入对手进行攻击。 有时会让对手陷入中毒状态。"
move_desc.poisontail: "用尾巴拍打。 有时会让对手陷入中毒状态， 也容易击中要害。"
move_desc.pollenpuff: "对敌人使用是会爆炸的团子。 对我方使用则是给予回复的团子。"
move_desc.poltergeist: "操纵对手的持有物进行攻击。 当对手没有携带道具时， 使出此招式时便会失败。"
move_desc.populationbomb: "伙伴们会纷纷赶来集合， 以群体行动给予对手攻击。 连续命中1～10次。"
move_desc.pounce: "飞扑向对手攻击。 会降低对手的速度。"
move_desc.pound: "使用长长的尾巴或手等拍打对手进行攻击。"
move_desc.powder: "如果被撒到粉尘的对手 使用火招式， 则会爆炸并给予伤害。"
move_desc.powdersnow: "将冰冷的细雪 吹向对手进行攻击。 有时会让对手陷入冰冻状态。"
move_desc.powergem: "发射如宝石般 闪耀的光芒攻击对手。"
move_desc.powershift: "将自己的攻击与防御互相交换。"
move_desc.powersplit: "利用超能力将自己和对手的 攻击和特攻相加， 再进行平分。"
move_desc.powerswap: "利用超能力互换 自己和对手的攻击 以及特攻的能力变化。"
move_desc.powertrick: "利用超能力交换 自己的攻击和 防御的力量。"
move_desc.powertrip: "耀武扬威地攻击对手， 自己的能力提高得越多， 威力就越大。"
move_desc.poweruppunch: "通过反复击打对手， 使自己的拳头慢慢变硬。 打中对手攻击就会提高。"
move_desc.powerwhip: "激烈地挥舞青藤或触手 摔打对手进行攻击。"
move_desc.precipiceblades: "将大地的力量变化为利刃 攻击对手。"
move_desc.present: "递给对手设有圈套的 盒子进行攻击。 也有可能回复对手ＨＰ。"
move_desc.prismaticlaser: "用棱镜的力量发射强烈光线。 下一回合自己将无法动弹。"
move_desc.protect: "完全抵挡 对手的攻击。 连续使出则容易失败。"
move_desc.psybeam: "向对手发射 神奇的光线进行攻击。 有时会使对手混乱。"
move_desc.psyblade: "用无形的利刃劈开对手。 处于电气场地时， 招式威力会变成1．5倍。"
move_desc.psychic: "向对手发送强大的念力进行攻击。 有时会降低对手的特防。"
move_desc.psychicfangs: "利用精神力量咬住对手进行攻击。 还可以破坏光墙和反射壁等。"
move_desc.psychicnoise: "用令对手不舒服的音波进行攻击。 让对手在2回合内无法通过招式、特性或携带的道具回复ＨＰ。"
move_desc.psychicterrain: "在５回合内，地面上的宝可梦 不会受到先制招式的攻击。 超能力属性的招式威力会提高。"
move_desc.psychoboost: "使出全部力量攻击对手。 使用之后会因为反作用力， 自己的特攻大幅降低。"
move_desc.psychocut: "用实体化的 心之利刃劈开对手。 容易击中要害。"
move_desc.psychoshift: "利用超能力施以暗示， 从而将自己受到的异常状态 转移给对手。"
move_desc.psychup: "向自己施以自我暗示， 将能力变化的状态 变得和对手一样。"
move_desc.psyshieldbash: "让意念的能量覆盖全身， 撞向对手进行攻击。 会提高自己的防御。"
move_desc.psyshock: "将神奇的念波实体化攻击对手。 给予物理伤害。"
move_desc.psystrike: "将神奇的念波实体化攻击对手。 给予物理伤害。"
move_desc.psywave: "向对手发射神奇的念波进行攻击。每次使用，伤害都会改变。"
move_desc.pulverizingpancake: "通过Ｚ力量使得认真起来的卡比兽跃动巨大身躯，全力向对手发动袭击。"
move_desc.punishment: "根据能力变化， 对手提高的力量越大， 招式的威力越大。"
move_desc.purify: "治愈对手的异常状态。 治愈后可以回复自己的HP。"
move_desc.pursuit: "当对手替换宝可梦上场时使出此招式的话， 能够以2倍的威力进行攻击。"
move_desc.pyroball: "点燃小石子，形成火球攻击对手。 有时会使对手陷入灼伤状态。"
move_desc.quash: "压制对手， 从而将其行动顺序放到最后。"
move_desc.quickattack: "以迅雷不及掩耳之势扑向对手。 必定能够先制攻击。"
move_desc.quickguard: "守护自己和同伴， 以防对手的先制攻击。"
move_desc.quiverdance: "轻巧地跳起神秘而又美丽的舞蹈。 提高自己的特攻、特防和速度。"
move_desc.rage: "如果在使出招式后受到攻击的话，会因愤怒的力量而提高攻击。"
move_desc.ragefist: "将愤怒化为力量攻击。 受到攻击的次数越多， 招式的威力越高。"
move_desc.ragepowder: "将令人烦躁的粉末撒在自己身上， 用以吸引对手的注意。 使对手的攻击全部指向自己。"
move_desc.ragingbull: "狂怒暴牛的猛烈冲撞。 招式的属性随形态改变， 光墙和反射壁等招式也能破坏。"
move_desc.ragingfury: "在2～3回合内， 一边放出火焰， 一边疯狂乱打。 大闹一番后自己会陷入混乱。"
move_desc.raindance: "在5回合内一直降雨， 从而提高水属性的招式威力。 火属性的招式威力则降低。"
move_desc.rapidspin: "通过旋转来攻击对手。 可以摆脱绑紧、紧束、寄生种子等招式。 还能提高自己的速度。"
move_desc.razorleaf: "飞出叶片， 切斩对手进行攻击。 容易击中要害。"
move_desc.razorshell: "用锋利的贝壳切斩对手进行攻击。 有时会降低对手的防御。"
move_desc.razorwind: "制造风之刃，于第２回合攻击对手。容易击中要害。"
move_desc.recover: "让细胞再生， 从而回复自己 最大ＨＰ的一半。"
move_desc.recycle: "使战斗中已经消耗掉的 自己的持有物再生， 并可以再次使用。"
move_desc.reflect: "利用神奇的墙壁， 在5回合内减弱从对手那里 受到的物理攻击的伤害。"
move_desc.reflecttype: "反射对手的属性， 让自己也变成一样的属性。"
move_desc.refresh: "让身体休息，治愈自己身上所中的毒、麻痹、灼伤的异常状态。"
move_desc.relicsong: "让对手听古老之歌， 打动对手的内心进行攻击。 有时会让对手陷入睡眠状态。"
move_desc.rest: "连续睡上2回合。 回复自己的全部HP以及治愈所有异常状态。"
move_desc.retaliate: "为倒下的同伴报仇。 如果上一回合有同伴倒下， 威力就会提高。"
move_desc.return: "为了训练家而全力攻击对手。亲密度越高，威力越大。"
move_desc.revelationdance: "全力跳舞进行攻击。 此招式的属性将变得和自己的属性相同。"
move_desc.revenge: "如果受到对手的招式攻击， 就能给予对手2倍的伤害。"
move_desc.reversal: "竭尽全力进行攻击。 自己的ＨＰ越少， 招式的威力越大。"
move_desc.revivalblessing: "通过以慈爱之心祈祷， 让陷入昏厥的后备宝可梦以回复一半HP的状态复活。"
move_desc.risingvoltage: "用从地面升腾而起的电击进行攻击。 当对手处于电气场地上时， 招式威力会变成2倍。"
move_desc.roar: "放走对手，强制拉后备宝可梦上场。 如果对手为野生宝可梦， 战斗将直接结束。"
move_desc.roaroftime: "释放出扭曲时间般的强大力量攻击对手。 下一回合自己将无法动弹。"
move_desc.rockblast: "向对手发射 坚硬的岩石进行攻击。 连续攻击2～5次。"
move_desc.rockclimb: "用尽全力扑向对手进行攻击。有时会使对手混乱。"
move_desc.rockpolish: "打磨自己的身体， 减少空气阻力。 可以大幅提高自己的速度。"
move_desc.rockslide: "将大岩石 猛烈地撞向对手进行攻击。 有时会使对手畏缩。"
move_desc.rocksmash: "用拳头进行攻击。 有时会降低对手的防御。"
move_desc.rockthrow: "拿起小岩石， 投掷对手进行攻击。"
move_desc.rocktomb: "投掷岩石进行攻击。 封住对手的行动， 从而降低速度。"
move_desc.rockwrecker: "向对手发射巨大的岩石进行攻击。 下一回合自己将无法动弹。"
move_desc.roleplay: "扮演对手， 让自己的特性变得和对手相同。"
move_desc.rollingkick: "一边使身体快速旋转，一边踢飞对手进行攻击。有时会使对手畏缩。"
move_desc.rollout: "在5回合内连续滚动攻击对手。 招式每次击中， 威力就会提高。"
move_desc.roost: "降到地面， 使身体休息。 回复自己最大HP的一半。"
move_desc.rototiller: "翻耕土地，使草木更容易成长。会提高草属性宝可梦的攻击和特攻。"
move_desc.round: "用歌声攻击对手。 同伴还可以接着使出轮唱招式， 威力也会提高。"
move_desc.ruination: "引发毁灭性的灾厄， 使对手的HP减半。"
move_desc.sacredfire: "用神秘的火焰 烧尽对手进行攻击。 有时会让对手陷入灼伤状态。"
move_desc.sacredsword: "用长角切斩对手进行攻击。 无视对手的能力变化， 直接给予伤害。"
move_desc.safeguard: "在５回合内 被神奇的力量守护， 从而不会陷入异常状态。"
move_desc.saltcure: "使对手陷入盐腌状态， 每回合给予对手伤害。 对手为钢或水属性时会更痛苦。"
move_desc.sandattack: "向对手脸上泼沙子， 从而降低命中率。"
move_desc.sandsearstorm: "用灼热的沙子和强烈的风席卷对手进行攻击。 有时会让对手陷入灼伤状态。"
move_desc.sandstorm: "在5回合内扬起沙暴， 除岩石、地面和 钢属性以外的宝可梦， 都会受到伤害。 岩石属性的特防还会提高。"
move_desc.sandtomb: "将对手困在 铺天盖地的沙暴中， 在4～5回合内进行攻击。"
move_desc.sappyseed: "长出巨大的藤蔓， 播撒种子进行攻击。 种子每回合都会吸取对手的HP。"
move_desc.savagespinout: "通过Ｚ力量将吐出的丝线全力束缚对手。 威力会根据原来的招式而改变。"
move_desc.scald: "向对手喷射 煮得翻滚的开水进行攻击。 有时会让对手陷入灼伤状态。"
move_desc.scaleshot: "发射鳞片进行攻击。 连续攻击2～5次。 速度会提高但防御会降低。"
move_desc.scaryface: "用恐怖的表情瞪着对手， 使其害怕， 从而大幅降低对手的速度。"
move_desc.scorchingsands: "将滚烫的沙子砸向对手进行攻击。 有时会让对手陷入灼伤状态。"
move_desc.scratch: "用坚硬且无比锋利的爪子 抓对手进行攻击。"
move_desc.screech: "发出不由自主想要捂起耳朵的刺耳声， 从而大幅降低对手的防御。"
move_desc.searingshot: "用熊熊烈火 攻击自己周围所有的宝可梦。 有时会陷入灼伤状态。"
move_desc.searingsunrazesmash: "得到Ｚ力量的索尔迦雷欧将全力进行攻击。 可以无视对手的特性效果。"
move_desc.secretpower: "根据使用场所不同，该招式的追加效果也会有所变化。"
move_desc.secretsword: "用长角切斩对手进行攻击。 角上拥有的神奇力量 将给予物理伤害。"
move_desc.seedbomb: "将外壳坚硬的大种子， 从上方砸下攻击对手。"
move_desc.seedflare: "从身体里产生冲击波。 有时会大幅降低对手的特防。"
move_desc.seismictoss: "利用引力将对手甩飞出去。 给予对手和自己等级相同的伤害。"
move_desc.selfdestruct: "引发爆炸， 攻击自己周围所有的宝可梦。 使用后陷入濒死。"
move_desc.shadowball: "投掷一团黑影进行攻击。 有时会降低对手的特防。"
move_desc.shadowbone: "用附有灵魂的骨头殴打对手进行攻击。 有时会降低对手的防御。"
move_desc.shadowclaw: "以影子做成的锐爪， 劈开对手。 容易击中要害。"
move_desc.shadowforce: "第1回合消失踪影， 第2回合攻击对手。 即使对手正受保护， 也能击中。"
move_desc.shadowpunch: "使出混影之拳。 攻击必定会命中。"
move_desc.shadowsneak: "伸长影子， 从对手的背后进行攻击。 必定能够先制攻击。"
move_desc.sharpen: "增加身体的角，变得棱棱角角，从而提高自己的攻击。"
move_desc.shatteredpsyche: "通过Ｚ力量操纵对手， 全力使其感受到痛苦。 威力会根据原来的招式而改变。"
move_desc.shedtail: "削减自己的HP， 制造分身后会返回， 并和后备宝可梦进行替换。"
move_desc.sheercold: "给对手一击濒死。 如果是冰属性以外的宝可梦使用， 就会难以打中。"
move_desc.shellsidearm: "从物理攻击和特殊攻击中选择 可造成较多伤害的方式进行攻击。 有时会让对手陷入中毒状态。"
move_desc.shellsmash: "打破外壳， 降低自己的防御和特防， 但大幅提高攻击、特攻和速度。"
move_desc.shelltrap: "设下甲壳陷阱。 如果对手使出物理招式， 陷阱就会爆炸并给予对手伤害。"
move_desc.shelter: "将皮肤变得坚硬如铁盾， 从而大幅提高自己的防御。"
move_desc.shiftgear: "转动齿轮， 不仅提高自己的攻击， 还会大幅提高速度。"
move_desc.shockwave: "向对手快速发出电击。 攻击必定会命中。"
move_desc.shoreup: "回复自己最大ＨＰ的一半。 在沙暴中回复得更多。"
move_desc.signalbeam: "发射神奇的光线进行攻击。有时会使对手混乱。"
move_desc.silktrap: "用丝设置陷阱。 防住对方攻击的同时， 能够降低所接触到的对手的速度。"
move_desc.silverwind: "在风中掺入鳞粉攻击对手。 有时会提高自己的全部能力。"
move_desc.simplebeam: "向对手发送谜之念波。 接收到念波的对手， 其特性会变为单纯。"
move_desc.sing: "让对手听舒适、 美妙的歌声， 从而陷入睡眠状态。"
move_desc.sinisterarrowraid: "通过Ｚ力量制造出无数箭的狙射树枭将全力射穿对手进行攻击。"
move_desc.sizzlyslide: "用燃起大火的身体猛烈地冲撞对手。让对手陷入灼伤状态。"
move_desc.sketch: "将对手使用的招式 变成自己的招式。 使用1次后写生消失。"
move_desc.skillswap: "利用超能力互换 自己和对手的特性。"
move_desc.skittersmack: "从对手背后爬近后进行攻击。 会降低对手的特攻。"
move_desc.skullbash: "第１回合把头缩进去， 从而提高防御。 第２回合攻击对手。"
move_desc.skyattack: "第2回合攻击对手。 偶尔使对手畏缩。 也容易击中要害。"
move_desc.skydrop: "第１回合将对手带到空中，第２回合将其摔下进行攻击。被带到空中的对手不能动弹。"
move_desc.skyuppercut: "用冲向天空般高高的上勾拳顶起对手进行攻击。"
move_desc.slackoff: "偷懒休息。 回复自己最大ＨＰ的一半。"
move_desc.slam: "使用长长的尾巴或藤蔓等 摔打对手进行攻击。"
move_desc.slash: "用爪子或镰刀等 劈开对手进行攻击。 容易击中要害。"
move_desc.sleeppowder: "撒出催眠粉， 从而让对手陷入睡眠状态。"
move_desc.sleeptalk: "从自己已学会的招式中 任意使出1个。 只能在自己睡觉时使用。"
move_desc.sludge: "用污泥投掷对手进行攻击。 有时会让对手陷入中毒状态。"
move_desc.sludgebomb: "用污泥投掷对手进行攻击。 有时会让对手陷入中毒状态。"
move_desc.sludgewave: "用污泥波攻击 自己周围所有的宝可梦。 有时会陷入中毒状态。"
move_desc.smackdown: "扔石头或炮弹， 攻击飞行的对手。 对手会被击落， 掉到地面。"
move_desc.smartstrike: "用尖尖的角刺入对手进行攻击。 攻击必定会命中。"
move_desc.smellingsalts: "对于麻痹状态下的对手， 威力会变成2倍。 但相反对手的麻痹也会被治愈。"
move_desc.smog: "将肮脏的浓雾 吹向对手进行攻击。 有时会让对手陷入中毒状态。"
move_desc.smokescreen: "向对手喷出烟或墨汁等， 从而降低对手的命中率。"
move_desc.snaptrap: "使用捕兽夹， 在4～5回合内， 夹住对手进行攻击。"
move_desc.snarl: "没完没了地大声斥责， 从而降低对手的特攻。"
move_desc.snatch: "将对手打算使用的回复招式或能力变化招式夺为己用。"
move_desc.snipeshot: "能无视具有吸引对手招式效果的特性或招式的影响。 可以向选定的对手进行攻击。"
move_desc.snore: "在自己睡觉时， 发出噪音进行攻击。 有时会使对手畏缩。"
move_desc.snowscape: "在5回合内会下雪。 冰属性的防御会提高。"
move_desc.soak: "将大量的水泼向对手， 从而使其变成水属性。"
move_desc.softboiled: "回复自己最大ＨＰ的一半。"
move_desc.solarbeam: "第1回合收集满满的日光， 第2回合发射光束进行攻击。"
move_desc.solarblade: "第1回合收集满满的日光， 第2回合将此力量集中在剑上进行攻击。"
move_desc.sonicboom: "将冲击波撞向对手进行攻击。必定会给予２０的伤害。"
move_desc.soulstealing7starstrike: "得到Ｚ力量的玛夏多将全力使出拳头和脚踢的连续招式叩打对手。"
move_desc.spacialrend: "将对手连同周围的空间一起 撕裂并给予伤害。 容易击中要害。"
move_desc.spark: "让电流覆盖全身， 猛撞向对手进行攻击。 有时会让对手陷入麻痹状态。"
move_desc.sparklingaria: "随着唱歌会放出很多气球。 受到此招式攻击时， 灼伤会被治愈。"
move_desc.sparklyswirl: "利用芬芳刺鼻的龙卷风吞噬对方。 能治愈我方宝可梦的异常状态。"
move_desc.spectralthief: "潜入对手的影子进行攻击。 会夺取对手的能力提升。"
move_desc.speedswap: "将对手和自己的速度 进行互换。"
move_desc.spicyextract: "放出极为辛辣的精华。 对手的攻击会大幅提高， 防御会大幅降低。"
move_desc.spiderweb: "将黏糊糊的细丝一层一层缠住对手， 使其不能从战斗中逃走。"
move_desc.spikecannon: "向对手发射锐针进行攻击。连续攻击２～５次。"
move_desc.spikes: "在对手的脚下扔撒菱。 对替换出场的对手的宝可梦给予伤害。"
move_desc.spikyshield: "防住对手攻击的同时， 削减接触到自己的对手的体力。"
move_desc.spinout: "通过往腿上增加负荷， 以激烈的旋转给予对手伤害。 自己的速度会大幅降低。"
move_desc.spiritbreak: "用足以让对手一蹶不振的气势进行攻击。 会降低对手的特攻。"
move_desc.spiritshackle: "攻击的同时， 缝住对手的影子， 使其无法逃走。"
move_desc.spite: "对对手最后使用的招式 怀有怨恨， 减少４ＰＰ该招式。"
move_desc.spitup: "将积蓄的力量撞向对手进行攻击。 积蓄得越多， 威力越大。"
move_desc.splash: "也不攻击只是一蹦一蹦地跳， 什么都不会发生……"
move_desc.splinteredstormshards: "得到Ｚ力量的鬃岩狼人将全力进行攻击。而且会消除场地状态。"
move_desc.splishysplash: "往巨浪中注入电能后冲撞对手进行攻击。有时会让对手陷入麻痹状态。"
move_desc.spore: "沙沙沙地撒满具有 催眠效果的孢子， 从而让对手陷入睡眠状态。"
move_desc.spotlight: "给宝可梦打上聚光灯，该回合只能瞄准该宝可梦。"
move_desc.springtidestorm: "用交织着爱与恨的烈风席卷对手进行攻击。 有时会降低对手的攻击。"
move_desc.stealthrock: "将无数岩石悬浮在对手的周围， 从而对替换出场的对手的 宝可梦给予伤害。"
move_desc.steameruption: "将滚烫的蒸汽喷向对手。 有时会让对手灼伤。"
move_desc.steamroller: "旋转揉成团的身体压扁对手。有时会使对手畏缩。"
move_desc.steelbeam: "将从全身聚集的钢铁 化为光束，激烈地发射出去。 自己也会受到伤害。"
move_desc.steelroller: "在破坏场地的同时攻击对手。 如果脚下没有任何场地状态存在， 使出此招式时便会失败。"
move_desc.steelwing: "用坚硬的翅膀敲打对手进行攻击。 有时会提高自己的防御。"
move_desc.stickyweb: "在对手周围围上黏黏的网， 降低替换出场的对手的速度。"
move_desc.stockpile: "积蓄力量， 提高自己的防御和特防。 最多积蓄3次。"
move_desc.stokedsparksurfer: "得到Ｚ力量的阿罗拉地区的雷丘将全力进行攻击。从而让对手陷入麻痹状态。"
move_desc.stomp: "用大脚踩踏对手进行攻击。 有时会使对手畏缩。"
move_desc.stompingtantrum: "化悔恨为力量进行攻击。 如果上一回合招式没有打中， 威力就会翻倍。"
move_desc.stoneaxe: "用岩石之斧瞄准要害进行攻击。 散落的岩石碎片会飘浮在对手周围。"
move_desc.stoneedge: "用尖尖的岩石 刺入对手进行攻击。 容易击中要害。"
move_desc.storedpower: "用蓄积起来的力量攻击对手。 自己的能力提高得越多， 威力就越大。"
move_desc.stormthrow: "向对手使出强烈的一击。 攻击必定会击中要害。"
move_desc.strangesteam: "喷出烟雾攻击对手。 有时会使对手混乱。"
move_desc.strength: "使出浑身力气 殴打对手进行攻击。"
move_desc.strengthsap: "给自己回复和对手攻击力相同数值的HP， 然后降低对手的攻击。"
move_desc.stringshot: "用口中吐出的丝缠绕对手， 从而大幅降低对手的速度。"
move_desc.struggle: "当自己的ＰＰ耗尽时， 努力挣扎攻击对手。 自己也会受到少许伤害。"
move_desc.strugglebug: "抵抗并攻击对手。 降低对手的特攻。"
move_desc.stuffcheeks: "吃掉携带的树果， 大幅提高防御。"
move_desc.stunspore: "撒出麻痹粉， 从而让对手陷入麻痹状态。"
move_desc.submission: "将对手连同自己一起 摔向地面进行攻击。 自己也会受到少许伤害。"
move_desc.substitute: "削减少许自己的HP， 制造分身。 分身将成为自己的替身。"
move_desc.subzeroslammer: "通过Ｚ力量急剧降低气温， 全力冰冻对手。 威力会根据原来的招式而改变。"
move_desc.suckerpunch: "可以比对手先攻击。 对手使出的招式 如果不是攻击招式则会失败。"
move_desc.sunnyday: "在5回合内让日照变得强烈， 从而提高火属性的招式威力。 水属性的招式威力则降低。"
move_desc.sunsteelstrike: "以流星般的气势猛撞对手。 可以无视对手的特性进行攻击。"
move_desc.supercellslam: "让身体带电后压向对手。 如果没有命中则自己会受到伤害。"
move_desc.superfang: "用锋利的门牙猛烈地咬住对手进行攻击。 对手的HP减半。"
move_desc.superpower: "发挥惊人的力量攻击对手。 自己的攻击和防御会降低。"
move_desc.supersonic: "从身体发出 特殊的音波， 从而使对手混乱。"
move_desc.supersonicskystrike: "通过Ｚ力量猛烈地飞向天空， 朝对手全力落下。 威力会根据原来的招式而改变。"
move_desc.surf: "利用大浪 攻击自己周围所有的宝可梦。"
move_desc.surgingstrikes: "将水之流派修炼至大成的 仿若行云流水般的3次连击。 必定会击中要害。"
move_desc.swagger: "激怒对手， 使其混乱。 因为愤怒， 对手的攻击会大幅提高。"
move_desc.swallow: "将积蓄的力量吞下， 从而回复自己的ＨＰ。 积蓄得越多， 回复越大。"
move_desc.sweetkiss: "像天使般可爱地亲吻对手， 从而使对手混乱。"
move_desc.sweetscent: "用香气大幅降低对手的闪避率。"
move_desc.swift: "发射星形的光攻击对手。 攻击必定会命中。"
move_desc.switcheroo: "用一闪而过的速度 交换自己和对手的持有物。"
move_desc.swordsdance: "激烈地跳起战舞提高气势。 大幅提高自己的攻击。"
move_desc.synchronoise: "用神奇电波对周围所有和自己属性相同的宝可梦给予伤害。"
move_desc.synthesis: "回复自己的ＨＰ。 根据天气的不同， 回复量也会有所变化。"
move_desc.syrupbomb: "使粘稠的麦芽糖浆爆炸， 让对手陷入满身糖状态， 在3回合内持续降低其速度。"
move_desc.tachyoncutter: "接连发射出粒子的利刃， 连续2次给予伤害。 攻击必定会命中。"
move_desc.tackle: "用整个身体 撞向对手进行攻击。"
move_desc.tailglow: "凝视闪烁的光芒， 集中自己的精神， 从而巨幅提高特攻。"
move_desc.tailslap: "用坚硬的尾巴 拍打对手进行攻击。 连续攻击2～5次。"
move_desc.tailwhip: "可爱地左右摇晃尾巴， 诱使对手疏忽大意。 会降低对手的防御。"
move_desc.tailwind: "刮起猛烈的旋风， 在4回合内 提高我方全员的速度。"
move_desc.takedown: "以惊人的气势 撞向对手进行攻击。 自己也会受到少许伤害。"
move_desc.takeheart: "鼓起冲劲， 治愈自己的异常状态， 同时提高自己的特攻和特防。"
move_desc.tarshot: "泼洒黏糊糊的沥青， 降低对手的速度， 并且使对手的弱点变为火。"
move_desc.taunt: "使对手愤怒。 在３回合内让对手 只能使出给予伤害的招式。"
move_desc.tearfullook: "变得泪眼汪汪， 让对手丧失斗志。 从而降低对手的攻击和特攻。"
move_desc.teatime: "举办一场茶会， 场上的所有宝可梦都会 吃掉自己携带的树果。"
move_desc.technoblast: "向对手放出光弹。 属性会根据自己携带的卡带不同而改变。"
move_desc.tectonicrage: "通过Ｚ力量潜入地里最深处， 全力撞上对手。 威力会根据原来的招式而改变。"
move_desc.teeterdance: "摇摇晃晃地跳起舞蹈， 让自己周围的宝可梦 陷入混乱状态。"
move_desc.telekinesis: "利用超能力使对手浮起来。在３回合内攻击会变得容易打中对手。"
move_desc.teleport: "当有后备宝可梦在时， 如果使用就可以进行替换。 野生的宝可梦会逃走。"
move_desc.temperflare: "以自暴自弃的气势进行攻击。 如果上一回合招式没有命中， 威力就会翻倍。"
move_desc.terablast: "太晶化时， 会放出太晶属性的能量攻击。 比较自己的攻击和特攻， 用数值相对较高的一项给予对方伤害。"
move_desc.terastarstorm: "照射出结晶的力量来驱逐敌人。 太乐巴戈斯在星晶形态下使出时， 能对所有对手造成伤害。"
move_desc.terrainpulse: "借助场地的力量进行攻击。 视使出招式时场地状态不同， 招式的属性和威力会有所变化。"
move_desc.thief: "攻击的同时盗取道具。 当自己携带道具时， 不会去盗取。"
move_desc.thousandarrows: "可以击中浮在空中的宝可梦。 空中的对手被击落后， 会掉到地面。"
move_desc.thousandwaves: "从地面掀起波浪进行攻击。 被掀入波浪中的对手， 将无法从战斗中逃走。"
move_desc.thrash: "在２～３回合内， 乱打一气地攻击对手。 大闹一番后自己会陷入混乱。"
move_desc.throatchop: "受到此招式攻击的对手， 会因为地狱般的痛苦， 在2回合内， 变得无法使出声音类招式。"
move_desc.thunder: "向对手劈下暴雷进行攻击。 有时会让对手陷入麻痹状态。"
move_desc.thunderbolt: "向对手发出 强力电击进行攻击。 有时会让对手陷入麻痹状态。"
move_desc.thundercage: "将对手困在 电流四溅的囚笼中， 在4～5回合内进行攻击。"
move_desc.thunderclap: "可以比对手先使出电击进行攻击。 对手使出的招式如果不是攻击招式则会失败。"
move_desc.thunderfang: "用蓄满电流的牙齿咬住对手。 有时会使对手畏缩 或陷入麻痹状态。"
move_desc.thunderouskick: "以雷电般的动作戏耍对手的同时使出脚踢。 可降低对手的防御。"
move_desc.thunderpunch: "用充满电流的拳头攻击对手。 有时会让对手陷入麻痹状态。"
move_desc.thundershock: "发出电流刺激对手进行攻击。 有时会让对手陷入麻痹状态。"
move_desc.thunderwave: "向对手发出 微弱的电击， 从而让对手陷入麻痹状态。"
move_desc.tickle: "给对手挠痒， 使其发笑， 从而降低对手的攻击和防御。"
move_desc.tidyup: "将撒菱、隐形岩、黏黏网、毒菱、替身全部扫除掉。 自己的攻击和速度会提高。"
move_desc.topsyturvy: "颠倒对手身上的 所有能力变化， 变成和原来相反的状态。"
move_desc.torchsong: "如唱歌一样喷出熊熊燃烧的火焰烧焦对手。 会提高自己的特攻。"
move_desc.torment: "向对手无理取闹， 令其不能连续２次 使出相同招式。"
move_desc.toxic: "让对手陷入剧毒状态。 随着回合的推进， 中毒伤害会增加。"
move_desc.toxicspikes: "在对手的脚下撒毒菱。 使对手替换出场的宝可梦中毒。"
move_desc.toxicthread: "将混有毒的丝吐向对手。 使其中毒， 从而降低对手的速度。"
move_desc.trailblaze: "跳出草丛进行攻击。 通过轻快的步伐会提高自己的速度。"
move_desc.transform: "变身成对手宝可梦的样子， 能够使用和对手 完全相同的招式。"
move_desc.triattack: "用３种光线进行攻击。 有时会让对手陷入 麻痹、灼伤或冰冻的状态。"
move_desc.trick: "抓住对手的空隙， 交换自己和对手的持有物。"
move_desc.trickortreat: "邀请对手参加万圣夜。 使对手被追加幽灵属性。"
move_desc.trickroom: "制造出离奇的空间。 在５回合内 速度慢的宝可梦可以先行动。"
move_desc.triplearrows: "使出一记腿技后同时发射3箭。 有时会降低对手的防御或使对手畏缩。 容易击中要害。"
move_desc.tripleaxel: "连续３次踢对手进行攻击。每踢中一次，威力就会提高。"
move_desc.tripledive: "以默契的跳跃溅起水花击向对手。 连续3次给予伤害。"
move_desc.triplekick: "连续３次踢对手进行攻击。 每踢中一次，威力就会提高。"
move_desc.tropkick: "向对手使出来自南国的火热脚踢。 从而降低对手的攻击。"
move_desc.trumpcard: "王牌招式的剩余ＰＰ越少，招式的威力越大。"
move_desc.twinbeam: "从两眼发射出神奇的光线攻击。 连续2次给予伤害。"
move_desc.twineedle: "将２根针刺入对手，连续２次给予伤害。有时会让对手陷入中毒状态。"
move_desc.twinkletackle: "通过Ｚ力量制造魅惑空间， 全力捉弄对手。 威力会根据原来的招式而改变。"
move_desc.twister: "兴起龙卷风， 将对手卷入进行攻击。 有时会使对手畏缩。"
move_desc.upperhand: "察觉到对手的动作后用掌根攻击， 让对手畏缩。 如果对手使出的招式不是先制攻击， 则会失败。"
move_desc.uproar: "在３回合内 用骚乱攻击对手。 在此期间谁都不能入眠。"
move_desc.uturn: "在攻击之后急速返回，和后备宝可梦进行替换。"
move_desc.vacuumwave: "挥动拳头， 掀起真空波。 必定能够先制攻击。"
move_desc.vcreate: "从前额产生灼热的火焰， 舍身撞击对手。 防御、特防和速度会降低。"
move_desc.veeveevolley: "伊布越喜欢训练家， 冲撞的威力就越强。 攻击必定会命中。"
move_desc.venomdrench: "将特殊的毒液泼向对手。 对处于中毒状态的对手， 其攻击、特攻和速度都会降低。"
move_desc.venoshock: "将特殊的毒液泼向对手。 对处于中毒状态的对手， 威力会变成2倍。"
move_desc.victorydance: "激烈地跳起唤来胜利的舞蹈， 提高自己的攻击、防御和速度。"
move_desc.vinewhip: "用如同鞭子般弯曲而细长的藤蔓 摔打对手进行攻击。"
move_desc.visegrip: "将对手从两侧夹住， 给予伤害。"
move_desc.vitalthrow: "会在对手之后进行攻击。 但是自己的攻击必定会命中。"
move_desc.voltswitch: "在攻击之后急速返回， 和后备宝可梦进行替换。"
move_desc.volttackle: "让电流覆盖全身猛撞向对手。 自己也会受到不小的伤害。 有时会让对手陷入麻痹状态。"
move_desc.wakeupslap: "给予睡眠状态下的对手较大的伤害。但相反对手会从睡眠中醒过来。"
move_desc.waterfall: "以惊人的气势扑向对手。 有时会使对手畏缩。"
move_desc.watergun: "向对手猛烈地喷射 水流进行攻击。"
move_desc.waterpledge: "用水柱进行攻击。 如果和火组合， 威力就会提高， 天空中会挂上彩虹。"
move_desc.waterpulse: "用水的震动攻击对手。 有时会使对手混乱。"
move_desc.watershuriken: "用粘液制成的手里剑， 连续攻击２～５次。 必定能够先制攻击。"
move_desc.watersport: "用水湿透周围。在５回合内减弱火属性的招式。"
move_desc.waterspout: "掀起潮水进行攻击。 自己的HP越少， 招式的威力越小。"
move_desc.wavecrash: "让水覆盖全身后撞向对手。 自己也会受到不少伤害。"
move_desc.weatherball: "根据使用时的天气， 招式属性和威力会改变。"
move_desc.whirlpool: "将对手困在激烈的 水流旋涡中， 在4～5回合内进行攻击。"
move_desc.whirlwind: "吹飞对手，强制拉后备宝可梦上场。 如果对手为野生宝可梦， 战斗将直接结束。"
move_desc.wickedblow: "将恶之流派修炼至大成的 猛烈一击。 必定会击中要害。"
move_desc.wickedtorque: "TODO"
move_desc.wideguard: "在１回合内防住 击打我方全员的攻击。"
move_desc.wildboltstorm: "呼唤雷云引起风暴， 用雷与风进行激烈的攻击。 有时会让对手陷入麻痹状态。"
move_desc.wildcharge: "让电流覆盖全身， 撞向对手进行攻击。 自己也会受到少许伤害。"
move_desc.willowisp: "放出怪异的火焰， 从而让对手陷入灼伤状态。"
move_desc.wingattack: "大大地展开美丽的翅膀， 将其撞向对手进行攻击。"
move_desc.wish: "在下一回合回复自己或是替换出场的宝可梦最大HP的一半。"
move_desc.withdraw: "缩入壳里保护身体， 从而提高自己的防御。"
move_desc.wonderroom: "制造出离奇的空间。 在5回合内互换所有宝可梦的防御和特防。"
move_desc.woodhammer: "用坚硬的躯体 撞击对手进行攻击。 自己也会受到不小的伤害。"
move_desc.workup: "激励自己， 从而提高攻击和特攻。"
move_desc.worryseed: "种植心神不宁的种子。 使对手不能入眠， 并将特性变成不眠。"
move_desc.wrap: "使用长长的身体或藤蔓等， 在４～５回合内 紧束对手进行攻击。"
move_desc.wringout: "用力勒紧对手进行攻击。 对手的HP越多， 威力越大。"
move_desc.xscissor: "将镰刀或爪子像剪刀般地交叉， 顺势劈开对手。"
move_desc.yawn: "打个大哈欠引起睡意。 在下一回合让对手陷入睡眠状态。"
move_desc.zapcannon: "发射大炮一样的 电流进行攻击。 让对手陷入麻痹状态。"
move_desc.zenheadbutt: "将思念的力量集中在 前额进行攻击。 有时会使对手畏缩。"
move_desc.zingzap: "撞向对手， 并发出强电， 使其感到麻麻刺刺的。 有时会使对手畏缩。"
move_desc.zippyzap: "迅猛无比的电击。必定能够先制攻击，击中对方的要害。"
