books:
  welcome:
    title: PokeDemo 가이드
    author: PtrMC
    pages:
    - '§d§l환영합니다, 트레이너!§r


      §7이 플러그인은 오픈소스이며 무료입니다.§r

      §4§l유료 경로로 구매하지 마세요.§r

      §4§l개조 후 유료 판매도 금지입니다.§r


      §7획득 방법:§r

      §2막대기 3개(무순서) 조합§r


      §7사용 방법:§r

      §3우클릭: 책 열기§r

      §3좌클릭: “가이드 전환” 메뉴§r

      §7(Shift+좌클릭: 빠른 다음)§r

      '
    - '§e§l중요§r

      §c서버가 렉일 때 장비를 GUI로 옮기지 마세요!§r

      §7(인벤토리 / PC / 기계 등)§r

      §c이로 인한 손실은 보상되지 않습니다.§r


      §e§l자주 쓰는 기능§r

      §a/recipes§r §f제작 레시피 열기§r


      §3§l포켓몬 소환§r

      §f§bShift§f + §bF§f(보조손 교체) 를 누른 채 소환 모드§r

      §f§b마우스 휠§f / §b단축바 숫자키§f로 파티를 소환§r


      §7다시 받기: §a/poke guide§r'
    - '§e§l파티 상세§r


      §a/party§r §f로 파티 상세를 열기§r


      §7파티 포켓몬, HP, 상태 이상 등 더 많은 정보를 확인할 수 있어요.§r


      §7오른쪽 파티 바도 현재 파티와 함께 동기화됩니다.§r'
  stones:
    title: 월드 & 자원
    author: PtrMC
    pages:
    - '§3§l진화의 돌(자연 생성)§r


      §3불의 돌§7: 네더§r

      §3리프의 돌§7: 나뭇잎 위 랜덤§r

      §3물의 돌§7: 바닷속§r

      §3번개의 돌§7: 높은 산의 노출된 바위§r

      §3달의 돌§7: 엔드§r

      '
    - '§3§l볼 재료(구과) & 나무열매§r


      §3구과§7: 나뭇잎을 부수면 낮은 확률로 드롭§r

      §4§l가위로는 드롭되지 않아요§r


      §3나무열매§7: 열매 덤불이 성숙하면 수확§r

      §7심으면 해당 열매가 고정 수확됩니다.§r

      '
    - '§3§l야생 전리품§r

      §7각종 아이템/기술머신 등은 야생 상자에서 획득하거나§r

      §7야생 포켓몬 처치 드롭으로 얻을 수 있어요.§r


      §3§l낚시 낮은 확률 보상§r

      §7민트/특성 캡슐/특성 패치/왕관/깃털/약/기술머신§r

      '
  breeding:
    title: 부화 & 환경 선호
    author: PtrMC
    pages:
    - '§3§l번식 기본§r

      §7성별과 알그룹에 따라 번식 가능 여부가 결정됩니다.§r

      §7또한 특정 환경(블록)을 선호할 수 있어요.§r

      '
    - '§3§l타입 선호 블록(예시)§r

      §3노말§7: 흰 양털§r

      §3비행§7: 유리§r

      §3불꽃§7: 네더랙§r

      §3에스퍼§7: 엔드 스톤§r

      §3물§7: 점토§r

      §3벌레§7: 모래§r

      §3전기§7: 레드스톤 블록§r

      §3바위§7: 조약돌§r

      '
    - '§3풀§7: 잔디 블록 / 건초 더미§r

      §3고스트§7: 영혼 모래§r

      §3얼음§7: 얼음 / 꽁꽁 언 얼음 / 파란 얼음§r

      §3드래곤§7: 마그마 블록§r

      §3격투§7: 뼈 블록§r

      §3악§7: 석탄 블록§r

      §3독§7: 슬라임 블록§r

      §3강철§7: 철 블록 / 구리 블록§r

      §3땅§7: 돌§r

      §3페어리§7: 발광석§r

      '
    - '§3§l부화§r

      §7알은 트레이너가 이동하면 부화합니다.§r

      §2많이 달리고, 탐험하고, 모험하세요!§r

      '
  devices:
    title: 장치 연구
    author: PtrMC
    pages:
    - '§3§l장치 연구§r

      §7채굴 중 이상한 돌을 발견할 수 있어요...§r

      §7기계를 만들어 연구해볼까요?§r

      '
    - '§3§l신비한 포켓몬§r

      §7정글에서 만나는 신비한 포켓몬은§r

      §7모든 포켓몬으로 변신할 수 있는 듯해요.§r

      §3실험해볼까요?§r

      '
    - '§3§l목장 & 에너지§r

      §7포켓몬 목장을 운영하는 것도 재미있을 거예요.§r

      §7밤에는 에너지 공급을 잊지 마세요.§r

      '
  legends:
    title: 전설
    author: PtrMC
    pages:
    - '§3§l전설§r

      §7극한 지역에 제단을 만들고 에너지를 주입하면...§r

      §7언젠가 전설을 마주칠 수 있을지도요.§r

      '
    - '§3§l유전자 & 비밀§r

      §7정글 깊숙한 곳의 수수께끼 포켓몬은§r

      §7모든 포켓몬의 유전자를 가졌다는 소문이 있어요...§r

      '
  community:
    title: 커뮤니티
    author: PtrMC
    pages:
    - '§3§l커뮤니티§r

      §7방문:§r

      §9https://nn2048.github.io/pokedemo-website/§r

