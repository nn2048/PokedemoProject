books:
  welcome:
    title: PokeDemo ガイド
    author: PtrMC
    pages:
    - '§d§lようこそ、トレーナー！§r


      §7このプラグインはオープンソースで無料です。§r

      §4§l有料で入手しないでください。§r

      §4§l改造版の有料配布も禁止です。§r


      §7入手方法：§r

      §2棒 3 本（順不同）でクラフト§r


      §7操作：§r

      §3右クリックで開く§r

      §3左クリックで「ガイド切替」メニュー§r

      §7（Shift+左クリック：次へ）§r

      '
    - '§e§l重要§r

      §cサーバーが重い時は、装備をGUIへ移動しないでください！§r

      §7(インベントリ / PC / 機械など)§r

      §cこれによる損失は補償されません。§r


      §e§lよく使う§r

      §a/recipes§r §fレシピを開く§r


      §3§lポケモン召喚§r

      §f§bShift§f + §bF§f（オフハンド交換）を押しっぱなしで召喚モード§r

      §f§bマウスホイール§f / §bホットバー数字キー§fで手持ちを召喚§r


      §7もう一度欲しい時：§a/poke guide§r'
    - '§e§l手持ち詳細§r


      §a/party§r §fで手持ち詳細を開く§r


      §7手持ちポケモン、HP、状態異常などを確認できます。§r


      §7右側の手持ちバーも現在の手持ちと同期します。§r'
  stones:
    title: 世界と資源
    author: PtrMC
    pages:
    - '§3§l進化の石（自然生成）§r


      §3ほのおのいし§7：ネザー§r

      §3リーフのいし§7：葉の上にランダム§r

      §3みずのいし§7：海底§r

      §3かみなりのいし§7：高い山の露出岩§r

      §3つきのいし§7：エンド§r

      '
    - '§3§lボールくり（球果）＆ きのみ§r


      §3球果§7：葉を壊すと低確率でドロップ§r

      §4§lハサミでは入手できません§r


      §3きのみ§7：きのみの木（茂み）が成熟すると収穫§r

      §7植えると同じ種類が固定で収穫できます。§r

      '
    - '§3§lワイルド戦利品§r

      §7道具・わざマシン等はワイルド宝箱、§r

      §7または野生ポケモン撃破ドロップで入手できます。§r


      §3§l釣りの低確率報酬§r

      §7ミント／特性カプセル／特性パッチ／王冠／羽／薬／わざマシン§r

      '
  breeding:
    title: 孵化と環境好み
    author: PtrMC
    pages:
    - '§3§l繁殖の基本§r

      §7性別とタマゴグループで可否が決まります。§r

      §7環境（ブロック）に好みがあるようです。§r

      '
    - '§3§lタイプ好みブロック（例）§r

      §3ノーマル§7：白い羊毛§r

      §3ひこう§7：ガラス§r

      §3ほのお§7：ネザーラック§r

      §3エスパー§7：エンドストーン§r

      §3みず§7：粘土§r

      §3むし§7：砂§r

      §3でんき§7：レッドストーンブロック§r

      §3いわ§7：丸石§r

      '
    - '§3くさ§7：草ブロック / 干草の俵§r

      §3ゴースト§7：ソウルサンド§r

      §3こおり§7：氷 / 氷塊 / 青氷§r

      §3ドラゴン§7：マグマブロック§r

      §3かくとう§7：骨ブロック§r

      §3あく§7：石炭ブロック§r

      §3どく§7：スライムブロック§r

      §3はがね§7：鉄ブロック / 銅ブロック§r

      §3じめん§7：石§r

      §3フェアリー§7：グロウストーン§r

      '
    - '§3§l孵化§r

      §7タマゴはトレーナーが移動すると孵化します。§r

      §2たくさん走って、探索して、冒険しよう！§r

      '
  devices:
    title: 装置研究
    author: PtrMC
    pages:
    - '§3§l装置研究§r

      §7採掘中に不思議な石が見つかるかも…§r

      §7機械を作って研究してみよう？§r

      '
    - '§3§l不思議なポケモン§r

      §7ジャングルで出会う不思議なポケモンは、§r

      §7すべてのポケモンに変身できるようです。§r

      §3実験してみますか？§r

      '
    - '§3§l牧場とエネルギー§r

      §7ポケモン牧場を運営するのも面白いでしょう。§r

      §7夜はエネルギー供給を忘れずに。§r

      '
  legends:
    title: 伝説
    author: PtrMC
    pages:
    - '§3§l伝説§r

      §7極限環境に祭壇を置き、エネルギーを注ぎます…§r

      §7いつか伝説の姿を目撃できるかもしれません。§r

      '
    - '§3§l遺伝子と秘密§r

      §7ジャングル奥地の謎のポケモンは、§r

      §7全ポケモンの遺伝子を持つと言われています…§r

      '
  community:
    title: コミュニティ
    author: PtrMC
    pages:
    - '§3§lコミュニティ§r

      §7訪問：§r

      §9https://nn2048.github.io/pokedemo-website/§r

      §7ガイドやフィードバックはこちら。§r


      §7サポート世界：§r

      §bhttps://nn2048.github.io/pokedemo-website/§r        §bhttps://nn2048.github.io/pokedemo-website/§r        §bhttps://nn2048.github.io/pokedemo-website/§r'
